<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Culture Simulation</title>
<style>
/* ===== Color Palette ===== */
:root {
	--color-white: #ffffff;
	--color-bg: #f0f2f5;
	--color-light-blue: #e3f2fd;
	--color-steel-gray: #78909c;
	--color-accent-green: #4caf50;
	--color-warning-orange: #ff9800;
	--color-text-dark: #212121;
	--color-text-light: #757575;
	--color-border: #eceff1;
	--color-shadow: rgba(0, 0, 0, 0.1);
	--color-shadow-dark: rgba(0, 0, 0, 0.25);
	--color-success: #66bb6a;
	--color-error: #ef5350;
}

/* ===== Global Styles ===== */
* {
	box-sizing: border-box;
}

html, body {
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
	background-color: var(--color-bg);
	color: var(--color-text-dark);
	-webkit-font-smoothing: antialiased;
	-moz-osx-font-smoothing: grayscale;
}

/* ===== Game Container ===== */
#game-container {
	display: flex;
	width: 100%;
	height: 100%;
	background-color: var(--color-bg);
}

/* ===== Hood Scene ===== */
#hood-scene {
	flex: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	background: linear-gradient(135deg, var(--color-white) 0%, var(--color-light-blue) 100%);
	overflow: hidden;
	position: relative;
	box-shadow: inset 0 1px 3px var(--color-shadow);
}

#hood-scene svg {
	max-width: 100%;
	max-height: 100%;
	filter: drop-shadow(0 2px 4px var(--color-shadow));
}

/* ===== Protocol Panel ===== */
#protocol-panel {
	width: 25%;
	min-width: 280px;
	background-color: var(--color-white);
	border-left: 1px solid var(--color-border);
	display: flex;
	flex-direction: column;
	box-shadow: -2px 0 8px var(--color-shadow);
	overflow-y: auto;
}

#score-display {
	padding: 20px;
	background: linear-gradient(135deg, var(--color-accent-green), var(--color-success));
	color: var(--color-white);
	text-align: center;
	border-bottom: 1px solid rgba(0, 0, 0, 0.1);
}

.score-label {
	font-size: 12px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	opacity: 0.9;
	margin-bottom: 8px;
}

.score-value {
	font-size: 36px;
	font-weight: 700;
	line-height: 1;
}

/* Protocol Content */
.protocol-content {
	padding: 20px;
	flex: 1;
	overflow-y: auto;
}

.protocol-content h2 {
	margin: 0 0 16px 0;
	font-size: 18px;
	font-weight: 600;
	color: var(--color-text-dark);
}

/* Protocol Checklist */
.protocol-checklist {
	list-style: none;
	margin: 0;
	padding: 0;
}

.protocol-step {
	display: flex;
	align-items: center;
	padding: 12px;
	margin-bottom: 8px;
	background-color: var(--color-bg);
	border-radius: 6px;
	transition: all 0.3s ease;
	cursor: pointer;
}

.protocol-step:hover {
	background-color: #e8eaed;
	transform: translateX(2px);
}

.protocol-step.current {
	background-color: var(--color-light-blue);
	border-left: 3px solid var(--color-accent-green);
	padding-left: 9px;
}

.protocol-step input[type="checkbox"] {
	width: 20px;
	height: 20px;
	margin-right: 12px;
	cursor: pointer;
	accent-color: var(--color-accent-green);
}

.protocol-step input[type="checkbox"]:checked {
	background-color: var(--color-accent-green);
}

.protocol-step label {
	cursor: pointer;
	flex: 1;
	font-size: 14px;
	color: var(--color-text-dark);
	user-select: none;
}

.protocol-step input[type="checkbox"]:checked + label {
	color: var(--color-text-light);
	text-decoration: line-through;
}

/* ===== Modal Overlays ===== */
.modal-overlay {
	display: none;
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background-color: rgba(0, 0, 0, 0.5);
	backdrop-filter: blur(2px);
	z-index: 1000;
	align-items: center;
	justify-content: center;
	animation: fadeIn 0.3s ease-out;
}

.modal-overlay.active {
	display: flex;
}

@keyframes fadeIn {
	from {
		opacity: 0;
	}
	to {
		opacity: 1;
	}
}

.modal-content {
	background-color: var(--color-white);
	border-radius: 12px;
	box-shadow: 0 10px 40px var(--color-shadow-dark);
	max-width: 90%;
	max-height: 90vh;
	overflow-y: auto;
	animation: slideUp 0.3s ease-out;
	position: relative;
}

@keyframes slideUp {
	from {
		transform: translateY(20px);
		opacity: 0;
	}
	to {
		transform: translateY(0);
		opacity: 1;
	}
}

.modal-close {
	position: absolute;
	top: 12px;
	right: 12px;
	width: 36px;
	height: 36px;
	border: none;
	background-color: transparent;
	font-size: 28px;
	color: var(--color-text-dark);
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	border-radius: 50%;
	transition: all 0.2s ease;
	z-index: 1001;
}

.modal-close:hover {
	background-color: var(--color-bg);
	color: var(--color-accent-green);
}

/* Microscope Modal */
.microscope-modal {
	padding: 40px 30px 30px;
	width: auto;
}

.microscope-modal h2 {
	margin: 0 0 20px 0;
	font-size: 24px;
	font-weight: 600;
	color: var(--color-text-dark);
}

.microscope-view {
	background-color: var(--color-bg);
	border-radius: 8px;
	padding: 20px;
	margin-bottom: 20px;
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: 320px;
}

#microscope-svg {
	max-width: 100%;
	height: auto;
}

.cell-count-section {
	display: flex;
	flex-direction: column;
	gap: 12px;
}

.cell-count-section label {
	font-size: 14px;
	font-weight: 500;
	color: var(--color-text-dark);
}

#cell-count-input {
	padding: 10px 12px;
	border: 1px solid var(--color-border);
	border-radius: 6px;
	font-size: 14px;
	transition: all 0.2s ease;
}

#cell-count-input:focus {
	outline: none;
	border-color: var(--color-accent-green);
	box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
}

#submit-cell-count {
	padding: 10px 16px;
	background-color: var(--color-accent-green);
	color: var(--color-white);
	border: none;
	border-radius: 6px;
	font-size: 14px;
	font-weight: 600;
	cursor: pointer;
	transition: all 0.2s ease;
}

#submit-cell-count:hover {
	background-color: var(--color-success);
	box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
}

#submit-cell-count:active {
	transform: scale(0.98);
}

/* Incubator Modal */
.incubator-modal {
	padding: 40px 30px 30px;
	width: auto;
	text-align: center;
}

.incubator-modal h2 {
	margin: 0 0 20px 0;
	font-size: 24px;
	font-weight: 600;
	color: var(--color-text-dark);
}

.incubator-view {
	background-color: var(--color-bg);
	border-radius: 8px;
	padding: 20px;
	margin-bottom: 20px;
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: 320px;
}

#incubator-svg {
	max-width: 100%;
	height: auto;
}

.incubation-timer {
	padding: 20px;
	background-color: var(--color-light-blue);
	border-radius: 8px;
}

.incubation-timer p {
	margin: 0 0 12px 0;
	font-size: 16px;
	color: var(--color-text-dark);
	font-weight: 500;
}

.progress-bar {
	width: 100%;
	height: 8px;
	background-color: var(--color-bg);
	border-radius: 4px;
	overflow: hidden;
	margin: 12px 0;
}

.progress-fill {
	height: 100%;
	background: linear-gradient(90deg, var(--color-accent-green), var(--color-success));
	width: 0%;
	transition: width 0.5s ease;
	border-radius: 4px;
}

#timer-text {
	margin-top: 12px;
	font-size: 14px;
	color: var(--color-text-light);
}

/* Results Modal */
.results-modal {
	padding: 40px 30px 30px;
	width: auto;
	text-align: center;
	min-width: 400px;
}

.results-modal h2 {
	margin: 0 0 30px 0;
	font-size: 28px;
	font-weight: 600;
	color: var(--color-text-dark);
}

.results-content {
	display: flex;
	flex-direction: column;
	gap: 20px;
}

.result-item {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 16px;
	background-color: var(--color-bg);
	border-radius: 8px;
}

.result-label {
	font-size: 14px;
	font-weight: 500;
	color: var(--color-text-light);
}

.result-value {
	font-size: 24px;
	font-weight: 700;
	color: var(--color-accent-green);
}

.results-message {
	padding: 16px;
	background-color: var(--color-light-blue);
	border-radius: 8px;
	font-size: 14px;
	color: var(--color-text-dark);
	line-height: 1.6;
	min-height: 60px;
	display: flex;
	align-items: center;
	justify-content: center;
}

/* ===== Buttons ===== */
.btn-primary {
	padding: 12px 24px;
	background-color: var(--color-accent-green);
	color: var(--color-white);
	border: none;
	border-radius: 6px;
	font-size: 16px;
	font-weight: 600;
	cursor: pointer;
	transition: all 0.2s ease;
	margin-top: 12px;
}

.btn-primary:hover {
	background-color: var(--color-success);
	box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
	transform: translateY(-2px);
}

.btn-primary:active {
	transform: translateY(0);
	box-shadow: 0 2px 4px rgba(76, 175, 80, 0.3);
}

/* ===== Notifications ===== */
#notification-area {
	position: fixed;
	bottom: 20px;
	left: 50%;
	transform: translateX(-50%);
	display: flex;
	flex-direction: column;
	gap: 10px;
	z-index: 2000;
	pointer-events: none;
}

.notification {
	background-color: var(--color-white);
	color: var(--color-text-dark);
	padding: 14px 20px;
	border-radius: 8px;
	box-shadow: 0 4px 12px var(--color-shadow-dark);
	font-size: 14px;
	font-weight: 500;
	animation: slideInUp 0.3s ease-out;
	pointer-events: auto;
	max-width: 400px;
	display: flex;
	align-items: center;
	gap: 12px;
}

@keyframes slideInUp {
	from {
		transform: translateY(20px);
		opacity: 0;
	}
	to {
		transform: translateY(0);
		opacity: 1;
	}
}

@keyframes slideOutDown {
	from {
		transform: translateY(0);
		opacity: 1;
	}
	to {
		transform: translateY(20px);
		opacity: 0;
	}
}

.notification.fade-out {
	animation: slideOutDown 0.3s ease-out forwards;
}

.notification.success {
	border-left: 4px solid var(--color-accent-green);
	background-color: #f1f8e9;
	color: var(--color-success);
}

.notification.warning {
	border-left: 4px solid var(--color-warning-orange);
	background-color: #fff3e0;
	color: var(--color-warning-orange);
}

.notification.error {
	border-left: 4px solid var(--color-error);
	background-color: #ffebee;
	color: var(--color-error);
}

.notification.info {
	border-left: 4px solid var(--color-steel-gray);
	background-color: #eceff1;
	color: var(--color-steel-gray);
}

/* ===== Volume Indicator ===== */
.volume-indicator {
	position: absolute;
	bottom: 20px;
	right: 20px;
	background-color: var(--color-white);
	border: 2px solid var(--color-steel-gray);
	border-radius: 8px;
	padding: 12px 16px;
	min-width: 120px;
	box-shadow: 0 2px 8px var(--color-shadow);
	font-size: 12px;
	font-weight: 600;
	color: var(--color-text-dark);
	z-index: 500;
}

.volume-label {
	text-transform: uppercase;
	letter-spacing: 0.5px;
	margin-bottom: 8px;
	color: var(--color-steel-gray);
}

.volume-bar {
	width: 100%;
	height: 24px;
	background-color: var(--color-bg);
	border-radius: 4px;
	overflow: hidden;
	margin-bottom: 8px;
	border: 1px solid var(--color-border);
}

.volume-fill {
	height: 100%;
	background: linear-gradient(90deg, var(--color-accent-green), var(--color-success));
	width: 0%;
	transition: width 0.2s ease;
	border-radius: 4px;
}

.volume-text {
	text-align: center;
	font-size: 13px;
	color: var(--color-text-dark);
}

/* ===== Responsive Design ===== */
@media (max-width: 1024px) {
	#protocol-panel {
		width: 30%;
		min-width: 240px;
	}

	.protocol-content {
		padding: 16px;
	}

	.protocol-step {
		padding: 10px;
		margin-bottom: 6px;
	}
}

@media (max-width: 768px) {
	#game-container {
		flex-direction: column;
	}

	#hood-scene {
		flex: 1;
		width: 100%;
		height: 60%;
	}

	#protocol-panel {
		width: 100%;
		height: 40%;
		min-width: unset;
		border-left: none;
		border-top: 1px solid var(--color-border);
		box-shadow: 0 -2px 8px var(--color-shadow);
	}

	.microscope-modal,
	.incubator-modal,
	.results-modal {
		width: 95vw;
		max-width: 90vw;
		padding: 30px 20px 20px;
	}

	.results-modal {
		min-width: auto;
	}

	.volume-indicator {
		bottom: 10px;
		right: 10px;
		min-width: 100px;
		padding: 10px 12px;
	}
}

@media (max-width: 480px) {
	#score-display {
		padding: 16px;
	}

	.score-value {
		font-size: 28px;
	}

	.protocol-content {
		padding: 12px;
	}

	.protocol-content h2 {
		font-size: 16px;
		margin-bottom: 12px;
	}

	.protocol-step {
		padding: 8px;
		margin-bottom: 4px;
	}

	.protocol-step label {
		font-size: 13px;
	}

	.microscope-modal,
	.incubator-modal {
		padding: 24px 16px 16px;
	}

	.microscope-modal h2,
	.incubator-modal h2 {
		font-size: 20px;
		margin-bottom: 16px;
	}

	.microscope-view,
	.incubator-view {
		min-height: 240px;
		padding: 12px;
	}

	.results-modal {
		padding: 24px 16px 16px;
	}

	.results-modal h2 {
		font-size: 22px;
		margin-bottom: 20px;
	}

	.result-item {
		padding: 12px;
		flex-direction: column;
		gap: 8px;
		align-items: flex-start;
	}

	.result-value {
		font-size: 20px;
	}

	.notification {
		max-width: calc(100vw - 20px);
		font-size: 13px;
	}

	.btn-primary {
		padding: 10px 20px;
		font-size: 14px;
	}
}
</style>

<div id="game-container">
	<!-- Main hood scene (left/center area) -->
	<div id="hood-scene"></div>

	<!-- Right sidebar: Protocol panel -->
	<div id="protocol-panel">
		<div id="score-display">
			<div class="score-label">Score</div>
			<div class="score-value">0</div>
		</div>
		<div class="protocol-content">
			<h2>Protocol</h2>
			<ul id="protocol-checklist" class="protocol-checklist">
				<li class="protocol-step">
					<input type="checkbox" id="step-spray" disabled>
					<label for="step-spray">Spray ethanol</label>
				</li>
				<li class="protocol-step">
					<input type="checkbox" id="step-aspirate" disabled>
					<label for="step-aspirate">Aspirate old media</label>
				</li>
				<li class="protocol-step">
					<input type="checkbox" id="step-add-media" disabled>
					<label for="step-add-media">Add fresh media</label>
				</li>
				<li class="protocol-step">
					<input type="checkbox" id="step-add-drug" disabled>
					<label for="step-add-drug">Add drug</label>
				</li>
				<li class="protocol-step">
					<input type="checkbox" id="step-incubate" disabled>
					<label for="step-incubate">Incubate</label>
				</li>
				<li class="protocol-step">
					<input type="checkbox" id="step-microscope" disabled>
					<label for="step-microscope">Check microscope</label>
				</li>
			</ul>
		</div>
	</div>

	<!-- Microscope overlay modal (hidden by default) -->
	<div id="microscope-overlay" class="modal-overlay">
		<div class="modal-content microscope-modal">
			<button class="modal-close" aria-label="Close microscope view">&times;</button>
			<h2>Microscope View</h2>
			<div class="microscope-view">
				<!-- SVG microscope view will be injected here -->
				<svg id="microscope-svg" viewBox="0 0 400 300" width="400" height="300"></svg>
			</div>
			<div class="cell-count-section">
				<label for="cell-count-input">Estimated cell count:</label>
				<input id="cell-count-input" type="number" placeholder="Enter count" min="0">
				<button id="submit-cell-count">Submit</button>
			</div>
		</div>
	</div>

	<!-- Incubator transition screen (hidden by default) -->
	<div id="incubator-screen" class="modal-overlay">
		<div class="modal-content incubator-modal">
			<h2>Incubator</h2>
			<div class="incubator-view">
				<!-- SVG incubator will be injected here -->
				<svg id="incubator-svg" viewBox="0 0 400 300" width="400" height="300"></svg>
			</div>
			<div class="incubation-timer">
				<p>Incubating cells...</p>
				<div class="progress-bar">
					<div class="progress-fill"></div>
				</div>
				<p id="timer-text">Time remaining: --</p>
			</div>
		</div>
	</div>

	<!-- Results screen (hidden by default) -->
	<div id="results-screen" class="modal-overlay">
		<div class="modal-content results-modal">
			<h2>Game Results</h2>
			<div class="results-content">
				<div class="result-item">
					<span class="result-label">Final Score:</span>
					<span class="result-value" id="final-score">0</span>
				</div>
				<div class="result-item">
					<span class="result-label">Cell Health:</span>
					<span class="result-value" id="cell-health">0%</span>
				</div>
				<div class="result-item">
					<span class="result-label">Contamination:</span>
					<span class="result-value" id="contamination-level">0%</span>
				</div>
				<div id="results-message" class="results-message"></div>
				<button id="play-again-btn" class="btn-primary">Play Again</button>
			</div>
		</div>
	</div>

	<!-- Notifications area (toast notifications) -->
	<div id="notification-area"></div>

	<!-- Volume indicator (pipette volume) -->
	<div id="volume-indicator" class="volume-indicator" style="display: none;">
		<div class="volume-label">Volume</div>
		<div class="volume-bar">
			<div class="volume-fill"></div>
		</div>
		<div class="volume-text">0 µL</div>
	</div>
</div>

    gameState.actualCellCount,
    gameState.cellViability

  return {
    totalCells: gameState.actualCellCount,
    liveCells: Math.round(gameState.actualCellCount * gameState.cellViability),

function generateCellPositions(totalCells, viability) {
  const visibleCellCount = 40 + Math.floor(Math.random() * 20);
  const positions = [];
  for (let i = 0; i < visibleCellCount; i++) {
    const x = 0.05 + Math.random() * 0.9;
    const y = 0.05 + Math.random() * 0.9;
    const isClumped = Math.random() < 0.2;
    const clumpOffset = isClumped ? (Math.random() - 0.5) * 0.03 : 0;
    const baseRadius = 0.012 + Math.random() * 6e-3;
    const alive = Math.random() < viability;
    positions.push({
      x: Math.max(0.02, Math.min(0.98, x + clumpOffset)),
      y: Math.max(0.02, Math.min(0.98, y + clumpOffset)),
      alive,
      radius: baseRadius
    });
  }
  return positions;
}

  if (concentrationUm > 0) {

function getWellPlateSvg(wells) {

  svg += '<rect x="2" y="2" width="196" height="126" rx="6" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>';
  for (let col = 0; col < PLATE_COLS; col++) {
    const cx = offsetX + col * spacingX;
    svg += '<text x="' + cx + '" y="12" font-family="Arial,sans-serif" font-size="7" fill="#999" text-anchor="middle">' + (col + 1) + "</text>";
  }
  const rowLabels = ["A", "B", "C", "D"];
  for (let row = 0; row < PLATE_ROWS; row++) {
    const cy = offsetY + row * spacingY;
    svg += '<text x="6" y="' + (cy + 3) + '" font-family="Arial,sans-serif" font-size="7" fill="#999">' + rowLabels[row] + "</text>";
  }
  for (let row = 0; row < PLATE_ROWS; row++) {
    for (let col = 0; col < PLATE_COLS; col++) {
      const cx = offsetX + col * spacingX;
      const cy = offsetY + row * spacingY;
      const well = wells[row * PLATE_COLS + col];
      let fill = "#f5f5f5";
      if (well.hasCells && well.drugConcentrationUm > 0) {
        const intensity = Math.min(1, well.drugConcentrationUm / 10);
        const r = Math.round(200 - intensity * 60);
        const g = Math.round(180 - intensity * 80);
        const b = Math.round(220 - intensity * 20);
        fill = "rgb(" + r + "," + g + "," + b + ")";
      } else if (well.hasCells) {
        fill = "#f0a0b0";
      }
      svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + wellR + '" fill="' + fill + '" stroke="#ccc" stroke-width="0.8"/>';
    }
  }
  for (let col = 0; col < PLATE_COLS; col++) {
    const cx = offsetX + col * spacingX;
    svg += '<text x="' + cx + '" y="125" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">' + DRUG_CONCENTRATION_LABELS[col] + "</text>";
  }
  svg += "</svg>";
  return svg;
}

    const isCurrent = gameState.currentStep === index;
    const li = document.createElement("li");
    li.className = "protocol-step";
    if (isCurrent) {
      li.classList.add("current");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const label = document.createElement("label");
    label.htmlFor = `step-${step.id}`;
    label.textContent = `${index + 1}. ${step.label}`;
    li.appendChild(checkbox);
    li.appendChild(label);
    checklist.appendChild(li);
  });
};

const showVolumeIndicator = (volumeMl, targetMl) => {
  const volumeIndicator = document.getElementById("volume-indicator");
  if (!volumeIndicator) return;
  volumeIndicator.style.display = "block";
  const tolerance = targetMl * 0.1;
  let fillColor = "#ef5350";
  if (Math.abs(volumeMl - targetMl) <= tolerance * 0.5) {
    fillColor = "#4caf50";
  } else if (Math.abs(volumeMl - targetMl) <= tolerance) {
    fillColor = "#ff9800";
  }
  const fillPercent = targetMl > 0 ? volumeMl / targetMl * 100 : 0;
  const boundedPercent = Math.min(Math.max(fillPercent, 0), 100);
  const volumeFill = volumeIndicator.querySelector(".volume-fill");
  if (volumeFill) {
    volumeFill.style.backgroundColor = fillColor;
    volumeFill.style.width = `${boundedPercent}%`;
  }
  const volumeText = volumeIndicator.querySelector(".volume-text");
  if (volumeText) {
    volumeText.textContent = `${volumeMl.toFixed(1)} / ${targetMl.toFixed(1)} mL`;
  }
};
const hideVolumeIndicator = () => {
  const volumeIndicator = document.getElementById("volume-indicator");
  if (volumeIndicator) {
    volumeIndicator.style.display = "none";
  }
};

let aspirationInterval = null;
let mediaAdditionInterval = null;
let stopMediaAddition = false;
function startAspiration() {
  if (gameState.flaskMediaAge !== "old") {
    showNotification("Flask does not have old media to aspirate.", "warning");
    return;
  }
  showNotification("Aspirating old media...");
  showVolumeIndicator(gameState.flaskMediaMl, gameState.flaskMediaMl);
  const startVolume = gameState.flaskMediaMl;
  const aspirationDuration = 2e3;
  const startTime = Date.now();
  aspirationInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / aspirationDuration, 1);
    gameState.flaskMediaMl = startVolume * (1 - progress);
    showVolumeIndicator(gameState.flaskMediaMl, startVolume);
    if (progress >= 1) {
      clearInterval(aspirationInterval);
      aspirationInterval = null;
      completeAspiration();
    }
  }, 50);
}
function completeAspiration() {
  if (gameState.flaskMediaMl > 0) {
    gameState.mediaWastedMl += gameState.flaskMediaMl;
  }
  gameState.flaskMediaMl = 0;
  completeStep("aspirate_old_media");
  hideVolumeIndicator();
  renderGame();
}
function startAddingMedia() {
  if (gameState.flaskMediaMl > 0.5) {
    showNotification("Flask must be aspirated first.", "warning");
    return;
  }
  stopMediaAddition = false;
  showNotification("Adding fresh media. Click to stop when target is reached.");
  showVolumeIndicator(0, FRESH_MEDIA_TARGET_ML);
  const additionDuration = 2e3;
  const startTime = Date.now();
  const startVolume = gameState.flaskMediaMl;
  mediaAdditionInterval = setInterval(() => {
    if (stopMediaAddition) {
      clearInterval(mediaAdditionInterval);
      mediaAdditionInterval = null;
      stopAddingMedia();
      return;
    }
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / additionDuration, 1);
    gameState.flaskMediaMl = startVolume + (FRESH_MEDIA_TARGET_ML - startVolume) * progress;
    showVolumeIndicator(gameState.flaskMediaMl, FRESH_MEDIA_TARGET_ML);
    if (progress >= 1) {
      clearInterval(mediaAdditionInterval);
      mediaAdditionInterval = null;
      stopAddingMedia();
    }
  }, 50);
}
function stopAddingMedia() {
  const finalVolume = gameState.flaskMediaMl;
  const waste = Math.abs(finalVolume - FRESH_MEDIA_TARGET_ML);
  gameState.mediaWastedMl += waste;
  gameState.flaskMediaAge = "fresh";
  completeStep("add_fresh_media");
  hideVolumeIndicator();
  const difference = (finalVolume - FRESH_MEDIA_TARGET_ML).toFixed(2);
  const differenceAbs = Math.abs(parseFloat(difference));
  let accuracyMessage = "";
  if (differenceAbs <= 0.5) {
    accuracyMessage = "Excellent! Very close to target.";
  } else if (differenceAbs <= 1) {
    accuracyMessage = "Good. Within acceptable range.";
  } else if (differenceAbs <= 2) {
    accuracyMessage = "Close, but could be more accurate.";
  } else {
    accuracyMessage = "Off target. Practice for better precision.";
  }
  showNotification(`Added ${finalVolume.toFixed(1)} mL. ${accuracyMessage}`);
  renderGame();
}
function onStopMediaAddition() {
  stopMediaAddition = true;
}

function startIncubationTimer() {
  const progressFill = document.querySelector("#incubator-screen .progress-fill");
  const timerText = document.getElementById("timer-text");
  if (!progressFill || !timerText) return;
  const duration = 4e3;
  const startTime = Date.now();
  const interval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const hoursRemaining = Math.round(24 * (1 - progress));
    progressFill.style.width = progress * 100 + "%";
    timerText.textContent = "Time remaining: " + hoursRemaining + "h";
    if (progress >= 1) {
      clearInterval(interval);
      completeIncubation();
    }
  }, 50);
}

function drawHemocytometerGrid(svg) {
  const ns = "http://www.w3.org/2000/svg";

  const h = 300;
  const bg = document.createElementNS(ns, "rect");
  bg.setAttribute("width", String(w));
  bg.setAttribute("height", String(h));
  bg.setAttribute("fill", "#fafafa");
  svg.appendChild(bg);
  const corners = [
    { x: 0, y: 0 },
    { x: 300, y: 0 },
    { x: 0, y: 225 },
    { x: 300, y: 225 }
  ];
  corners.forEach((c) => {

    rect.setAttribute("stroke-dasharray", "4,2");

  });
  for (let i = 0; i <= 4; i++) {

    hLine.setAttribute("y2", String(i * 75));
    hLine.setAttribute("stroke", "#999");
    hLine.setAttribute("stroke-width", i === 0 || i === 4 ? "2" : "1");
    svg.appendChild(hLine);
  }
  for (let i = 0; i < 16; i++) {
    if (i % 4 === 0) continue;
    const vLine = document.createElementNS(ns, "line");
    vLine.setAttribute("x1", String(i * 25));
    vLine.setAttribute("y1", "0");
    vLine.setAttribute("x2", String(i * 25));
    vLine.setAttribute("y2", String(h));
    vLine.setAttribute("stroke", "#ddd");
    vLine.setAttribute("stroke-width", "0.5");
    svg.appendChild(vLine);
  }
  for (let i = 0; i < 16; i++) {
    if (i % 4 === 0) continue;
    const hLine = document.createElementNS(ns, "line");
    hLine.setAttribute("x1", "0");
    hLine.setAttribute("y1", String(i * 18.75));
    hLine.setAttribute("x2", String(w));
    hLine.setAttribute("y2", String(i * 18.75));
    hLine.setAttribute("stroke", "#ddd");
    hLine.setAttribute("stroke-width", "0.5");
    svg.appendChild(hLine);
  }
  const label = document.createElementNS(ns, "text");
  label.setAttribute("x", "200");
  label.setAttribute("y", "295");
  label.setAttribute("text-anchor", "middle");
  label.setAttribute("font-size", "10");
  label.setAttribute("fill", "#999");
  label.textContent = "Count cells in highlighted corner squares";
  svg.appendChild(label);
}
function drawCellsOnGrid(cellState) {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("microscope-svg");
  if (!svg) return;
  cellState.positions.forEach((pos) => {
    const circle = document.createElementNS(ns, "circle");
    circle.setAttribute("cx", String(pos.x * 400));
    circle.setAttribute("cy", String(pos.y * 300));
    circle.setAttribute("r", String(pos.radius * 300));
    if (pos.alive) {
      circle.setAttribute("fill", "rgba(200,200,200,0.6)");
    } else {
      circle.setAttribute("fill", "rgba(50,100,200,0.7)");
    }
    circle.setAttribute("stroke", "#333");
    circle.setAttribute("stroke-width", "0.5");
    svg.appendChild(circle);
  });
}
function submitCellCount() {
  const input = document.getElementById("cell-count-input");
  if (!input) return;
  const count = parseInt(input.value);
  if (isNaN(count) || count < 0) {
    showNotification("Please enter a valid positive number.", "warning");
    return;
  }
  gameState.cellCount = count;
  const actual = gameState.actualCellCount;
  const errorPercent = Math.abs(count - actual) / actual * 100;
  let feedback = "";
  if (errorPercent <= 10) {
    feedback = "Excellent count! Very close to actual.";
  } else if (errorPercent <= 25) {
    feedback = "Good count. Within acceptable range.";
  } else {
    feedback = "Count is off. Actual was ~" + actual.toLocaleString() + " cells/mL.";
  }
  showNotification(feedback, errorPercent <= 25 ? "success" : "info");
  completeStep("count_cells");
  const overlay = document.getElementById("microscope-overlay");
  if (overlay) overlay.classList.remove("active");
  switchScene("hood");
}
function renderPlateReaderScene() {
  const overlay = document.getElementById("microscope-overlay");
  if (!overlay) return;
  overlay.classList.add("active");
  generatePlateReaderResults();
  const modal = overlay.querySelector(".modal-content");
  if (!modal) return;
  let html = '<button class="modal-close" aria-label="Close">&times;</button>';
  html += "<h2>Plate Reader Results (MTT Assay - 570 nm)</h2>";
  html += '<div class="microscope-view" style="flex-direction:column;min-height:auto;padding:16px;">';
  html += '<table style="border-collapse:collapse;width:100%;font-size:13px;">';
  html += '<tr><th style="padding:6px;border:1px solid #ddd;background:#f5f5f5;"></th>';
  for (let col = 0; col < PLATE_COLS; col++) {
    html += '<th style="padding:6px;border:1px solid #ddd;background:#f5f5f5;">' + DRUG_CONCENTRATION_LABELS[col] + " uM</th>";
  }
  html += "</tr>";
  const rowLabels = ["A", "B", "C", "D"];
  for (let row = 0; row < PLATE_ROWS; row++) {
    html += "<tr>";
    html += '<td style="padding:6px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;">' + rowLabels[row] + "</td>";
    for (let col = 0; col < PLATE_COLS; col++) {
      const well = getWell(row, col);
      const intensity = well.absorbance;
      const bgR = Math.round(255 - intensity * 100);
      const bgG = Math.round(255 - intensity * 40);
      const bgB = Math.round(255 - intensity * 120);
      html += '<td style="padding:6px;border:1px solid #ddd;text-align:center;background:rgb(' + bgR + "," + bgG + "," + bgB + ');">';
      html += well.absorbance.toFixed(3);
      html += "</td>";
    }
    html += "</tr>";
  }
  html += "</table>";
  html += '<div style="margin-top:16px;">';
  html += '<h3 style="font-size:14px;margin:0 0 8px 0;">Column Averages</h3>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  for (let col = 0; col < PLATE_COLS; col++) {
    let sum = 0;
    for (let row = 0; row < PLATE_ROWS; row++) {
      sum += getWell(row, col).absorbance;
    }
    const avg = sum / PLATE_ROWS;
    html += '<div style="text-align:center;padding:8px 12px;background:#f0f2f5;border-radius:6px;min-width:60px;">';
    html += '<div style="font-size:11px;color:#757575;">' + DRUG_CONCENTRATION_LABELS[col] + " uM</div>";
    html += '<div style="font-size:16px;font-weight:600;">' + avg.toFixed(3) + "</div>";
    html += "</div>";
  }
  html += "</div></div>";
  html += "</div>";
  html += '<div style="text-align:center;margin-top:16px;">';
  html += '<button id="complete-plate-read" class="btn-primary" style="padding:10px 24px;">Complete Experiment</button>';
  html += "</div>";
  modal.innerHTML = html;
  const completeBtn = document.getElementById("complete-plate-read");
  if (completeBtn) {
    completeBtn.addEventListener("click", () => {
      gameState.plateReadComplete = true;
      completeStep("plate_read");
      overlay.classList.remove("active");
    });
  }
  const closeBtn = modal.querySelector(".modal-close");
  if (closeBtn) {
    closeBtn.addEventListener("click", () => {
      overlay.classList.remove("active");
      switchScene("hood");
    });
  }
}
function generatePlateReaderResults() {
  const controlAbsorbance = 1.2 + Math.random() * 0.3;
  gameState.wellPlate.forEach((well) => {
    if (!well.hasCells) {
      well.absorbance = 0.05 + Math.random() * 0.02;
      return;
    }
    const drugConc = well.drugConcentrationUm;
    const ic50 = 2;
    const hillSlope = 1.5;
    const survivalFraction = 1 / (1 + Math.pow(drugConc / ic50, hillSlope));
    const baseAbsorbance = controlAbsorbance * survivalFraction;
    const noise = (Math.random() - 0.5) * 0.08;
    well.absorbance = Math.max(0.05, baseAbsorbance + noise);
  });
}
function calculateScore() {
  const totalSteps = PROTOCOL_STEPS.length;
  const orderRatio = totalSteps > 0 ? gameState.stepsInCorrectOrder / totalSteps : 0;
  const orderPoints = Math.round(orderRatio * SCORE_WEIGHTS.order);
  let orderFeedback = "Steps completed in perfect order.";
  if (orderRatio < 1) {
    orderFeedback = gameState.stepsOutOfOrder + " step(s) out of order. Follow the protocol sequence.";
  }
  const maxErrors = 5;
  const cleanRatio = Math.max(0, 1 - gameState.cleanlinessErrors / maxErrors);
  const cleanPoints = Math.round(cleanRatio * SCORE_WEIGHTS.cleanliness);
  let cleanFeedback = "Excellent sterile technique!";
  if (gameState.cleanlinessErrors > 0) {
    cleanFeedback = gameState.cleanlinessErrors + " contamination risk(s) detected. Be more careful with sterile technique.";
  }
  const maxWaste = 5;
  const wasteRatio = Math.max(0, 1 - gameState.mediaWastedMl / maxWaste);
  const wastePoints = Math.round(wasteRatio * SCORE_WEIGHTS.wastedMedia);
  let wasteFeedback = "Minimal media waste. Good pipetting accuracy!";
  if (gameState.mediaWastedMl > 1) {
    wasteFeedback = gameState.mediaWastedMl.toFixed(1) + " mL of media wasted. Practice precise pipetting.";
  }
  const elapsedMs = (gameState.endTime || Date.now()) - gameState.startTime;
  const elapsedMin = elapsedMs / 6e4;
  const idealMin = 3;
  const maxMin = 10;
  let timingRatio = 1;
  if (elapsedMin > idealMin) {
    timingRatio = Math.max(0, 1 - (elapsedMin - idealMin) / (maxMin - idealMin));
  }
  const timingPoints = Math.round(timingRatio * SCORE_WEIGHTS.timing);
  let timingFeedback = "Great pacing! Efficient work.";
  if (elapsedMin > idealMin) {
    timingFeedback = "Completed in " + elapsedMin.toFixed(1) + " minutes. With practice you will get faster.";
  }
  const totalPoints = orderPoints + cleanPoints + wastePoints + timingPoints;
  let stars = 1;
  if (totalPoints >= STAR_THRESHOLDS.threeStar) {
    stars = 3;
  } else if (totalPoints >= STAR_THRESHOLDS.twoStar) {
    stars = 2;
  }
  return {
    stars,
    totalPoints,
    categories: {
      order: { points: orderPoints, maxPoints: SCORE_WEIGHTS.order, feedback: orderFeedback },
      cleanliness: { points: cleanPoints, maxPoints: SCORE_WEIGHTS.cleanliness, feedback: cleanFeedback },
      wastedMedia: { points: wastePoints, maxPoints: SCORE_WEIGHTS.wastedMedia, feedback: wasteFeedback },
      timing: { points: timingPoints, maxPoints: SCORE_WEIGHTS.timing, feedback: timingFeedback }
    }
  };
}
renderGame = function() {
  switch (gameState.activeScene) {
    case "hood":
      renderHoodScene();
      break;
    case "incubator":
      renderIncubatorScene();
      break;
    case "microscope":
      renderMicroscopeScene();
      break;
    case "plate_reader":
      renderPlateReaderScene();
      break;
    case "results":
      const scoreResult = calculateScore();
      renderResultsScreen(scoreResult);
      break;
  }
  renderProtocolPanel();
  renderScoreDisplay();
};
document.addEventListener("DOMContentLoaded", () => {
  gameState = createInitialGameState();
  renderGame();
  showNotification("Welcome! Follow the protocol steps on the right.", "info");
});
</script>
