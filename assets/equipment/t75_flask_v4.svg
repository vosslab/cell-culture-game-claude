<svg xmlns="http://www.w3.org/2000/svg" id="t75_flask_v4" viewBox="0 0 140 230">
	<defs>
		<!-- Liquid clipping region: follows flask interior silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 20 110 L 20 210 Q 20 220 28 225 L 112 225 Q 120 220 120 210 L 120 110 Z"/>
		</clipPath>
	</defs>

	<!-- BODY: main flask shape (T-75 laid horizontal, side view) -->
	<g id="body">
		<!-- Main flask body (flat polystyrene rectangle, slightly angled base) -->
		<path d="M 28 110 L 112 110 Q 120 115 120 125 L 120 210 Q 120 220 112 225 L 28 225 Q 20 220 20 210 L 20 125 Q 20 115 28 110 Z"
		      fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>

		<!-- Inner face (slightly lighter for depth) -->
		<path d="M 32 115 L 108 115 Q 114 118 114 125 L 114 205 Q 114 215 108 220 L 32 220 Q 26 215 26 205 L 26 125 Q 26 118 32 115 Z"
		      fill="#f8f8f8" stroke="none"/>

		<!-- Glass shine on left side -->
		<ellipse cx="32" cy="160" rx="3" ry="40" fill="#ffffff" opacity="0.4"/>

		<!-- Bottom edge highlight -->
		<line x1="28" y1="222" x2="112" y2="222" stroke="#dddddd" stroke-width="0.8"/>
	</g>

	<!-- NECK: angled neck connecting body to cap (T-flask horizontal neck tilts up-left) -->
	<g id="neck">
		<!-- Neck walls (angled from body up to cap) -->
		<path d="M 40 70 L 35 110 L 85 110 L 80 70 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>

		<!-- Neck interior (glass tint) -->
		<path d="M 43 75 L 39 108 L 81 108 L 77 75 Z" fill="#f8f8f8" stroke="none"/>

		<!-- Thread lines on neck -->
		<line x1="42" y1="82" x2="78" y2="82" stroke="#999999" stroke-width="0.4"/>
		<line x1="41" y1="92" x2="79" y2="92" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: screw cap (blue, at top-left of flask) -->
	<g id="cap">
		<!-- Cap body (rounded rectangle) -->
		<rect x="38" y="45" width="44" height="20" rx="3" fill="#2107ff" stroke="#1a0099" stroke-width="1.5"/>

		<!-- Cap top face (ellipse for 3D) -->
		<ellipse cx="60" cy="45" rx="22" ry="4" fill="#3d2bff" stroke="#1a0099" stroke-width="1"/>

		<!-- Cap grip ridges -->
		<line x1="42" y1="53" x2="78" y2="53" stroke="#0d0055" stroke-width="0.5"/>
		<line x1="42" y1="58" x2="78" y2="58" stroke="#0d0055" stroke-width="0.5"/>
	</g>

	<!-- VENT_AREA: yellow vent pad on cap -->
	<g id="vent_area">
		<rect x="48" y="48" width="24" height="12" rx="2" fill="#f7f65e" opacity="0.8" stroke="#d4d400" stroke-width="0.5"/>
		<line x1="51" y1="52" x2="69" y2="52" stroke="#d4d400" stroke-width="0.3"/>
		<line x1="51" y1="56" x2="69" y2="56" stroke="#d4d400" stroke-width="0.3"/>
	</g>

	<!-- LIQUID: pink media pooled in bottom of flask (static for base, overlays add dynamic fill) -->
	<g id="liquid_static" clip-path="url(#anchor_liquid_clip)">
		<ellipse cx="70" cy="215" rx="48" ry="12" fill="#f0143f" opacity="0.3"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="35" y="145" width="70" height="40" rx="2" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- GRADUATION: volume marks on flask wall -->
	<g id="graduation">
		<!-- Major marks -->
		<line x1="118" y1="135" x2="130" y2="135" stroke="#666666" stroke-width="0.8"/>
		<line x1="118" y1="160" x2="130" y2="160" stroke="#666666" stroke-width="0.8"/>
		<line x1="118" y1="185" x2="130" y2="185" stroke="#666666" stroke-width="0.8"/>

		<!-- Volume labels -->
		<text x="134" y="138" font-family="Arial,sans-serif" font-size="4" fill="#666666">75</text>
		<text x="134" y="163" font-family="Arial,sans-serif" font-size="4" fill="#666666">50</text>
		<text x="134" y="188" font-family="Arial,sans-serif" font-size="4" fill="#666666">25</text>

		<!-- Minor marks -->
		<line x1="120" y1="148" x2="128" y2="148" stroke="#999999" stroke-width="0.4"/>
		<line x1="120" y1="173" x2="128" y2="173" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<!-- Liquid fill region bounds -->
	<rect id="anchor_liquid_bounds" x="20" y="110" width="100" height="115" fill="none" stroke="none" display="none"/>

	<!-- Highlight border bounds -->
	<rect id="anchor_highlight" x="15" y="40" width="120" height="195" fill="none" stroke="none" display="none"/>

	<!-- Dynamic label position (inside label_frame) -->
	<rect id="anchor_label" x="35" y="145" width="70" height="40" fill="none" stroke="none" display="none"/>

	<!-- Error indicator position (top-right corner) -->
	<rect id="anchor_error" x="110" y="65" width="16" height="16" fill="none" stroke="none" display="none"/>
</svg>
