<svg id="ethanol_spray" viewBox="0 0 40 80" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Liquid clip: inner bottle wall rectangle -->
		<clipPath id="anchor_liquid_clip">
			<rect x="13" y="16" width="15" height="52" rx="1"/>
		</clipPath>
	</defs>


	<!-- BODY: spray bottle with trigger -->
	<g id="body">
		<!-- spray nozzle head -->
		<rect x="16" y="5" width="8" height="5" rx="0.5"
			fill="#666666" stroke="#333333" stroke-width="1"/>
		<circle cx="20" cy="5" r="2"
			fill="#444444" stroke="#333333" stroke-width="0.5"/>
		<!-- pump tube (inner, shown as line) -->
		<line x1="20" y1="9" x2="20" y2="52"
			stroke="#888888" stroke-width="0.8" opacity="0.5"/>
		<!-- trigger -->
		<path d="M 14 20 L 8 34 Q 7 40 12 43 L 14 36 Z"
			fill="#b0b0b0" stroke="#333333" stroke-width="1"/>
		<!-- main bottle body -->
		<path d="M 12 14 L 12 62 Q 12 70 18 72 L 22 72 Q 28 70 28 62 L 28 14 Z"
			fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- inner bottle face -->
		<path d="M 14 17 L 14 61 Q 14 67 19 69 L 21 69 Q 26 67 26 61 L 26 17 Z"
			fill="#f8f8f8" stroke="none"/>
		<!-- bottle shine -->
		<ellipse cx="16" cy="38" rx="2" ry="16"
			fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="13" y="50" width="15" height="13" rx="1"
			fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds"
		x="13" y="16" width="15" height="52"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_highlight"
		x="6" y="3" width="24" height="72"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_label"
		x="13" y="50" width="15" height="13"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="26" y="4" width="12" height="12"
		fill="none" stroke="none" display="none"/>
</svg>
