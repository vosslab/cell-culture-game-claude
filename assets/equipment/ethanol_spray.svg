<svg xmlns="http://www.w3.org/2000/svg" id="ethanol_spray" viewBox="0 0 25 73">
	<defs>
		<!-- Liquid clip: inner bottle wall rectangle -->
		<clipPath id="anchor_liquid_clip">
			<rect x="8" y="15" width="15" height="52" rx="1"/>
		</clipPath>
	</defs>


	<!-- BODY: spray bottle with trigger -->
	<g id="body">
		<!-- spray nozzle head -->
		<rect x="11" y="4" width="8" height="5" rx="0.5" fill="#666666" stroke="#333333" stroke-width="1"/>
		<circle cx="15" cy="4" r="2" fill="#444444" stroke="#333333" stroke-width="0.5"/>
		<!-- pump tube (inner, shown as line) -->
		<line x1="15" y1="8" x2="15" y2="51" stroke="#888888" stroke-width="0.8" opacity="0.5"/>
		<!-- trigger -->
		<path d="M 9 19 L 3 33 Q 2 39 7 42 L 9 35 Z" fill="#b0b0b0" stroke="#333333" stroke-width="1"/>
		<!-- main bottle body -->
		<path d="M 7 13 L 7 61 Q 7 69 13 71 L 17 71 Q 23 69 23 61 L 23 13 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- inner bottle face -->
		<path d="M 9 16 L 9 60 Q 9 66 14 68 L 16 68 Q 21 66 21 60 L 21 16 Z" fill="#f8f8f8" stroke="none"/>
		<!-- bottle shine -->
		<ellipse cx="11" cy="37" rx="2" ry="16" fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="8" y="49" width="15" height="13" rx="1" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="8" y="15" width="15" height="52" fill="none" stroke="none" display="none"/>
	<rect id="anchor_highlight" x="1" y="2" width="24" height="72" fill="none" stroke="none" display="none"/>
	<rect id="anchor_label" x="8" y="49" width="15" height="13" fill="none" stroke="none" display="none"/>
	<rect id="anchor_error" x="21" y="3" width="12" height="12" fill="none" stroke="none" display="none"/>
</svg>
