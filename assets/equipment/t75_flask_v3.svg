<svg xmlns="http://www.w3.org/2000/svg" id="t75_flask_v3" viewBox="0 0 102 166">
	<defs>
		<!-- Liquid clipping region: follows flask interior silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 4 56 L 4 157 Q 4 162 8 164 L 90 164 Q 94 162 94 157 L 94 56 Z"/>
		</clipPath>
	</defs>

	<!-- BODY: classic Corning-style T-75 (straight-sided, tall, compact) -->
	<g id="body">
		<!-- Main flask body (tall, slightly tapered bottom - classic Corning) -->
		<path d="M 4 50 L 10 165 Q 10 163 14 164 L 88 164 Q 92 163 92 165 L 98 50 Q 51 48 4 50 Z" fill="#ececec" stroke="#333333" stroke-width="1.5"/>
		<!-- Inner face (slightly lighter for depth) -->
		<path d="M 8 52 L 12 163 L 90 163 L 94 52 Q 51 50 8 52 Z" fill="#f6f6f6" stroke="none"/>
		<!-- Top face ellipse (3D opening effect) -->
		<ellipse cx="51" cy="50" rx="46" ry="7" fill="#fafafa" stroke="#333333" stroke-width="1.5"/>
		<!-- Glass shine on left side -->
		<path d="M 10 58 L 12 155 L 16 155 L 14 58 Z" fill="#ffffff" opacity="0.5"/>
		<!-- Bottom curved highlight -->
		<ellipse cx="51" cy="162" rx="40" ry="2" fill="#e5e5e5" opacity="0.6"/>
	</g>

	<!-- NECK: straight cylindrical neck (classic Corning design) -->
	<g id="neck">
		<!-- Left neck wall -->
		<line x1="32" y1="22" x2="35" y2="50" stroke="#333333" stroke-width="1.5"/>
		<!-- Right neck wall -->
		<line x1="70" y1="22" x2="67" y2="50" stroke="#333333" stroke-width="1.5"/>
		<!-- Neck connector at top -->
		<line x1="32" y1="22" x2="70" y2="22" stroke="#333333" stroke-width="1.5"/>
		<!-- Neck interior (glass tint) -->
		<path d="M 36 25 L 38 48 L 64 48 L 66 25 Z" fill="#f8f8f8" stroke="none"/>
		<!-- Thread lines on neck -->
		<line x1="35" y1="30" x2="67" y2="30" stroke="#999999" stroke-width="0.4"/>
		<line x1="34" y1="38" x2="68" y2="38" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: simple screw cap with ridge grip -->
	<g id="cap">
		<!-- Cap body (flat top) -->
		<rect x="30" y="8" width="42" height="16" rx="2" fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<!-- Cap top face -->
		<ellipse cx="51" cy="8" rx="21" ry="3" fill="#999999" stroke="#333333" stroke-width="1"/>
		<!-- Cap grip ridges (4 lines for good grip) -->
		<line x1="34" y1="13" x2="68" y2="13" stroke="#666666" stroke-width="0.4"/>
		<line x1="34" y1="16" x2="68" y2="16" stroke="#666666" stroke-width="0.4"/>
		<line x1="34" y1="19" x2="68" y2="19" stroke="#666666" stroke-width="0.4"/>
	</g>

	<!-- GRADUATION: volume marks on flask wall (Corning-style on flat side) -->
	<g id="graduation">
		<!-- Major marks (every 25 mL equivalent) -->
		<line x1="85" y1="68" x2="96" y2="68" stroke="#666666" stroke-width="0.8"/>
		<line x1="85" y1="88" x2="96" y2="88" stroke="#666666" stroke-width="0.8"/>
		<line x1="85" y1="108" x2="96" y2="108" stroke="#666666" stroke-width="0.8"/>
		<line x1="85" y1="128" x2="96" y2="128" stroke="#666666" stroke-width="0.8"/>
		<line x1="85" y1="148" x2="96" y2="148" stroke="#666666" stroke-width="0.8"/>
		<!-- Volume labels -->
		<text x="98" y="70" font-family="Arial,sans-serif" font-size="5" fill="#666666">75</text>
		<text x="98" y="90" font-family="Arial,sans-serif" font-size="5" fill="#666666">50</text>
		<text x="98" y="110" font-family="Arial,sans-serif" font-size="5" fill="#666666">25</text>
		<!-- Minor marks -->
		<line x1="87" y1="78" x2="93" y2="78" stroke="#999999" stroke-width="0.4"/>
		<line x1="87" y1="98" x2="93" y2="98" stroke="#999999" stroke-width="0.4"/>
		<line x1="87" y1="118" x2="93" y2="118" stroke="#999999" stroke-width="0.4"/>
		<line x1="87" y1="138" x2="93" y2="138" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background (text is dynamic) -->
	<g id="label_frame">
		<rect x="12" y="95" width="52" height="30" rx="1" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements for the engine -->
	<!-- Liquid fill region bounds -->
	<rect id="anchor_liquid_bounds" x="4" y="56" width="90" height="108" fill="none" stroke="none" display="none"/>
	<!-- Highlight border bounds (slightly outside body) -->
	<rect id="anchor_highlight" x="0" y="5" width="100" height="162" fill="none" stroke="none" display="none"/>
	<!-- Dynamic label position (inside label_frame) -->
	<rect id="anchor_label" x="12" y="95" width="52" height="30" fill="none" stroke="none" display="none"/>
	<!-- Error indicator position (top-right corner) -->
	<rect id="anchor_error" x="77" y="43" width="16" height="16" fill="none" stroke="none" display="none"/>
</svg>
