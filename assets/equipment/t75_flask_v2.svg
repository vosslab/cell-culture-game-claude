<svg xmlns="http://www.w3.org/2000/svg" id="t75_flask_v2" viewBox="0 0 102 166">
	<defs>
		<!-- Liquid clipping region: follows flask interior silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 5 60 L 5 157 Q 5 162 9 164 L 87 164 Q 91 162 91 157 L 91 60 Z"/>
		</clipPath>
	</defs>

	<!-- BODY: main flask shape (flat rectangular T-75, refined) -->
	<g id="body">
		<!-- Main flask body (flat polystyrene rectangle) -->
		<rect x="3" y="55" width="86" height="110" rx="5" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- Inner face (slightly lighter for depth) -->
		<rect x="7" y="59" width="78" height="102" rx="4" fill="#f8f8f8" stroke="none"/>
		<!-- Top face ellipse (3D opening effect) -->
		<ellipse cx="46" cy="55" rx="43" ry="6" fill="#fafafa" stroke="#333333" stroke-width="1.5"/>
		<!-- Bottom edge highlight -->
		<line x1="7" y1="160" x2="85" y2="160" stroke="#dddddd" stroke-width="0.8"/>
		<!-- Glass shine on left side -->
		<rect x="8" y="63" width="4" height="88" rx="1" fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- NECK: slanted neck connecting body to cap (more anatomically angled) -->
	<g id="neck">
		<!-- Slanted left wall -->
		<path d="M 25 20 L 20 55 L 33 55 L 35 20 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- Slanted right wall -->
		<path d="M 67 20 L 69 55 L 82 55 L 77 20 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- Neck interior (glass tint) -->
		<path d="M 29 23 L 25 53 L 77 53 L 73 23 Z" fill="#f8f8f8" stroke="none"/>
		<!-- Thread lines on neck -->
		<line x1="31" y1="27" x2="71" y2="27" stroke="#999999" stroke-width="0.4"/>
		<line x1="30" y1="35" x2="72" y2="35" stroke="#999999" stroke-width="0.4"/>
		<line x1="29" y1="43" x2="73" y2="43" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: vented cap (modern design with small vent holes) -->
	<g id="cap">
		<!-- Cap body (slanted top) -->
		<path d="M 28 8 L 35 3 L 67 3 L 74 8 L 72 18 L 30 18 Z" fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<!-- Cap top face ellipse -->
		<ellipse cx="51" cy="6" rx="19" ry="3" fill="#999999" stroke="#333333" stroke-width="1"/>
		<!-- Cap grip ridges -->
		<line x1="32" y1="13" x2="70" y2="13" stroke="#666666" stroke-width="0.4"/>
		<line x1="32" y1="16" x2="70" y2="16" stroke="#666666" stroke-width="0.4"/>
		<!-- Vent holes (two small circles on cap top) -->
		<circle cx="40" cy="5" r="1" fill="#555555" stroke="none"/>
		<circle cx="62" cy="5" r="1" fill="#555555" stroke="none"/>
	</g>

	<!-- GRADUATION: volume marks on flask wall -->
	<g id="graduation">
		<!-- Major marks (every 25 mL equivalent) -->
		<line x1="82" y1="75" x2="92" y2="75" stroke="#666666" stroke-width="0.8"/>
		<line x1="82" y1="95" x2="92" y2="95" stroke="#666666" stroke-width="0.8"/>
		<line x1="82" y1="115" x2="92" y2="115" stroke="#666666" stroke-width="0.8"/>
		<line x1="82" y1="135" x2="92" y2="135" stroke="#666666" stroke-width="0.8"/>
		<line x1="82" y1="155" x2="92" y2="155" stroke="#666666" stroke-width="0.8"/>
		<!-- Volume labels -->
		<text x="94" y="77" font-family="Arial,sans-serif" font-size="5" fill="#666666">75</text>
		<text x="94" y="97" font-family="Arial,sans-serif" font-size="5" fill="#666666">50</text>
		<text x="94" y="117" font-family="Arial,sans-serif" font-size="5" fill="#666666">25</text>
		<!-- Minor marks -->
		<line x1="84" y1="85" x2="90" y2="85" stroke="#999999" stroke-width="0.4"/>
		<line x1="84" y1="105" x2="90" y2="105" stroke="#999999" stroke-width="0.4"/>
		<line x1="84" y1="125" x2="90" y2="125" stroke="#999999" stroke-width="0.4"/>
		<line x1="84" y1="145" x2="90" y2="145" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background (text is dynamic) -->
	<g id="label_frame">
		<rect x="12" y="100" width="52" height="30" rx="1" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements for the engine -->
	<!-- Liquid fill region bounds -->
	<rect id="anchor_liquid_bounds" x="5" y="60" width="86" height="104" fill="none" stroke="none" display="none"/>
	<!-- Highlight border bounds (slightly outside body) -->
	<rect id="anchor_highlight" x="0" y="2" width="96" height="165" fill="none" stroke="none" display="none"/>
	<!-- Dynamic label position (inside label_frame) -->
	<rect id="anchor_label" x="12" y="100" width="52" height="30" fill="none" stroke="none" display="none"/>
	<!-- Error indicator position (top-right corner) -->
	<rect id="anchor_error" x="77" y="50" width="16" height="16" fill="none" stroke="none" display="none"/>
</svg>
