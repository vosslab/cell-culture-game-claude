<svg viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Waste tray (shallow, wide container) -->
  <defs>
    <linearGradient id="wasteTrayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdbdbd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer tray rim (perspective view) -->
  <path d="M 5 15 L 8 20 L 62 20 L 65 15 Z" fill="#999" stroke="#666" stroke-width="1"/>

  <!-- Inner tray surface (3D effect) -->
  <ellipse cx="35" cy="20" rx="30" ry="10" fill="url(#wasteTrayGrad)" stroke="#999" stroke-width="1.5"/>

  <!-- Bottom edge line -->
  <path d="M 5 15 L 8 20 Q 35 25 62 20 L 65 15" fill="none" stroke="#888" stroke-width="0.5"/>

  <!-- Slight reflection inside -->
  <ellipse cx="35" cy="18" rx="25" ry="6" fill="#f5f5f5" opacity="0.3"/>

  <!-- Biohazard symbol (hint of waste) -->
  <text x="35" y="22" font-family="Arial,sans-serif" font-size="8" fill="#c62828" text-anchor="middle" font-weight="bold">X</text>

  <!-- Label below -->
  <text x="35" y="42" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Waste</text>
</svg>
