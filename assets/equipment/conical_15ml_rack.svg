<svg xmlns="http://www.w3.org/2000/svg" id="conical_15ml_rack" viewBox="0 0 60 70">
	<!-- 15 mL conical tube rack: 3x2 grid of 15 mL tubes in a plastic stand. -->
	<defs>
		<linearGradient id="tube_body" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#e8f1f8"/>
			<stop offset="50%" stop-color="#ffffff"/>
			<stop offset="100%" stop-color="#d4dde4"/>
		</linearGradient>
	</defs>

	<!-- Rack base plate -->
	<g id="base">
		<rect x="2" y="52" width="56" height="16" rx="2" fill="#4a5560" stroke="#2a3038" stroke-width="1"/>
		<rect x="4" y="54" width="52" height="3" rx="1" fill="#5d6773"/>
		<!-- Six tube holes in the top of the base -->
		<ellipse cx="10" cy="54" rx="3" ry="0.8" fill="#2a3038"/>
		<ellipse cx="20" cy="54" rx="3" ry="0.8" fill="#2a3038"/>
		<ellipse cx="30" cy="54" rx="3" ry="0.8" fill="#2a3038"/>
		<ellipse cx="40" cy="54" rx="3" ry="0.8" fill="#2a3038"/>
		<ellipse cx="50" cy="54" rx="3" ry="0.8" fill="#2a3038"/>
	</g>

	<!-- Five visible 15 mL conical tubes with screw caps -->
	<g id="tubes">
		<!-- Tube 1 -->
		<path d="M 7 18 L 7 46 Q 7 50 10 53 Q 13 50 13 46 L 13 18 Z" fill="url(#tube_body)" stroke="#8a95a0" stroke-width="0.6"/>
		<rect x="6.5" y="13" width="7" height="6" rx="0.8" fill="#d94444" stroke="#8a2525" stroke-width="0.6"/>
		<line x1="7.5" y1="15" x2="12.5" y2="15" stroke="#8a2525" stroke-width="0.3"/>
		<!-- Tube 2 -->
		<path d="M 17 18 L 17 46 Q 17 50 20 53 Q 23 50 23 46 L 23 18 Z" fill="url(#tube_body)" stroke="#8a95a0" stroke-width="0.6"/>
		<rect x="16.5" y="13" width="7" height="6" rx="0.8" fill="#d94444" stroke="#8a2525" stroke-width="0.6"/>
		<line x1="17.5" y1="15" x2="22.5" y2="15" stroke="#8a2525" stroke-width="0.3"/>
		<!-- Tube 3 -->
		<path d="M 27 18 L 27 46 Q 27 50 30 53 Q 33 50 33 46 L 33 18 Z" fill="url(#tube_body)" stroke="#8a95a0" stroke-width="0.6"/>
		<rect x="26.5" y="13" width="7" height="6" rx="0.8" fill="#d94444" stroke="#8a2525" stroke-width="0.6"/>
		<line x1="27.5" y1="15" x2="32.5" y2="15" stroke="#8a2525" stroke-width="0.3"/>
		<!-- Tube 4 -->
		<path d="M 37 18 L 37 46 Q 37 50 40 53 Q 43 50 43 46 L 43 18 Z" fill="url(#tube_body)" stroke="#8a95a0" stroke-width="0.6"/>
		<rect x="36.5" y="13" width="7" height="6" rx="0.8" fill="#d94444" stroke="#8a2525" stroke-width="0.6"/>
		<line x1="37.5" y1="15" x2="42.5" y2="15" stroke="#8a2525" stroke-width="0.3"/>
		<!-- Tube 5 -->
		<path d="M 47 18 L 47 46 Q 47 50 50 53 Q 53 50 53 46 L 53 18 Z" fill="url(#tube_body)" stroke="#8a95a0" stroke-width="0.6"/>
		<rect x="46.5" y="13" width="7" height="6" rx="0.8" fill="#d94444" stroke="#8a2525" stroke-width="0.6"/>
		<line x1="47.5" y1="15" x2="52.5" y2="15" stroke="#8a2525" stroke-width="0.3"/>
	</g>

	<!-- Graduation marks on the front tube -->
	<g id="graduations" stroke="#8a95a0" stroke-width="0.3">
		<line x1="27" y1="26" x2="29" y2="26"/>
		<line x1="27" y1="32" x2="29" y2="32"/>
		<line x1="27" y1="38" x2="29" y2="38"/>
		<line x1="27" y1="44" x2="29" y2="44"/>
	</g>
</svg>
