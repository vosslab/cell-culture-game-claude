<svg id="drug_vial_rack" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">

	<!-- BODY SHADOW: depth offset (3px right, 3px down) -->
	<g id="body_shadow">
		<rect x="5" y="18" width="116" height="45" rx="3" fill="#cccccc"/>
	</g>

	<!-- BODY: horizontal rack frame with 6 vial slots -->
	<g id="body">
		<!-- rack outer frame -->
		<rect x="2" y="15" width="116" height="43" rx="3"
			fill="#e8e8e8" stroke="#333333" stroke-width="1.5"/>
		<!-- rack inner surface -->
		<rect x="5" y="18" width="110" height="37" rx="2"
			fill="#dddddd" stroke="none"/>
		<!-- rack front bar -->
		<rect x="2" y="50" width="116" height="6" rx="1"
			fill="#cccccc" stroke="#333333" stroke-width="0.8"/>
		<!-- 6 vial hole openings at top of rack -->
		<ellipse cx="12" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<ellipse cx="30" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<ellipse cx="48" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<ellipse cx="66" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<ellipse cx="84" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<ellipse cx="102" cy="18" rx="5" ry="2"
			fill="#aaaaaa" stroke="#999999" stroke-width="0.5"/>
		<!-- rack title label -->
		<text x="60" y="9" font-family="Arial,sans-serif" font-size="6"
			fill="#555555" text-anchor="middle">Drug Stock</text>
	</g>

	<!-- OVERLAY_ROOT: engine injects per-vial color overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight"
		x="0" y="0" width="120" height="60"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="104" y="1" width="14" height="14"
		fill="none" stroke="none" display="none"/>
</svg>
