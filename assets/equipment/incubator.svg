<svg xmlns="http://www.w3.org/2000/svg" id="incubator" viewBox="0 0 104 132">

	<!-- BODY: main incubator shape -->
	<g id="body">
		<!-- Main cabinet body -->
		<rect x="2" y="2" width="100" height="120" rx="4" fill="#b0b0b0" stroke="#888888" stroke-width="1.5"/>
		<!-- Door panel -->
		<rect x="7" y="7" width="90" height="90" rx="2" fill="#cccccc" stroke="#999999" stroke-width="1"/>
		<!-- Door window -->
		<rect x="22" y="17" width="60" height="50" rx="2" fill="#e8e8e8" stroke="#aaaaaa" stroke-width="0.8"/>
		<!-- Window glass tint -->
		<rect x="24" y="19" width="56" height="46" rx="1" fill="#f5f5f5" stroke="none"/>
		<!-- Glass reflection -->
		<line x1="27" y1="22" x2="27" y2="60" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
		<!-- Door handle -->
		<rect x="80" y="37" width="12" height="6" rx="2" fill="#888888" stroke="#666666" stroke-width="0.8"/>
		<!-- Temperature display -->
		<rect x="22" y="74" width="40" height="16" rx="2" fill="#1a1a2e" stroke="#333333" stroke-width="0.8"/>
		<text x="42" y="86" text-anchor="middle" font-size="10" font-family="monospace" fill="#44dd66">37.0</text>
		<!-- CO2 indicator -->
		<rect x="66" y="74" width="24" height="16" rx="2" fill="#1a1a2e" stroke="#333333" stroke-width="0.8"/>
		<text x="78" y="86" text-anchor="middle" font-size="8" font-family="monospace" fill="#44dd66">5%</text>
		<!-- Base/feet -->
		<rect x="4" y="122" width="96" height="8" rx="2" fill="#999999" stroke="#777777" stroke-width="1"/>
		<!-- Top vent -->
		<rect x="27" y="2" width="50" height="4" rx="1" fill="#999999" stroke="#888888" stroke-width="0.5"/>
		<line x1="37" y1="3" x2="37" y2="5" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="47" y1="3" x2="47" y2="5" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="57" y1="3" x2="57" y2="5" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="67" y1="3" x2="67" y2="5" stroke="#aaaaaa" stroke-width="0.5"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight" x="0" y="0" width="104" height="132" fill="none" stroke="none" display="none"/>
	<rect id="anchor_error" x="72" y="0" width="12" height="12" fill="none" stroke="none" display="none"/>
</svg>
