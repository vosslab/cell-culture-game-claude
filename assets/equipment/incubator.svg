<svg id="incubator" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">

	<!-- BODY: main incubator shape -->
	<g id="body">
		<!-- Main cabinet body -->
		<rect x="10" y="20" width="100" height="120" rx="4"
			fill="#b0b0b0" stroke="#888888" stroke-width="1.5"/>
		<!-- Door panel -->
		<rect x="15" y="25" width="90" height="90" rx="2"
			fill="#cccccc" stroke="#999999" stroke-width="1"/>
		<!-- Door window -->
		<rect x="30" y="35" width="60" height="50" rx="2"
			fill="#e8e8e8" stroke="#aaaaaa" stroke-width="0.8"/>
		<!-- Window glass tint -->
		<rect x="32" y="37" width="56" height="46" rx="1"
			fill="#f5f5f5" stroke="none"/>
		<!-- Glass reflection -->
		<line x1="35" y1="40" x2="35" y2="78"
			stroke="#ffffff" stroke-width="1" opacity="0.6"/>
		<!-- Door handle -->
		<rect x="88" y="55" width="12" height="6" rx="2"
			fill="#888888" stroke="#666666" stroke-width="0.8"/>
		<!-- Temperature display -->
		<rect x="30" y="92" width="40" height="16" rx="2"
			fill="#1a1a2e" stroke="#333333" stroke-width="0.8"/>
		<text x="50" y="104" text-anchor="middle"
			font-size="10" font-family="monospace" fill="#44dd66">37.0</text>
		<!-- CO2 indicator -->
		<rect x="74" y="92" width="24" height="16" rx="2"
			fill="#1a1a2e" stroke="#333333" stroke-width="0.8"/>
		<text x="86" y="104" text-anchor="middle"
			font-size="8" font-family="monospace" fill="#44dd66">5%</text>
		<!-- Base/feet -->
		<rect x="12" y="140" width="96" height="8" rx="2"
			fill="#999999" stroke="#777777" stroke-width="1"/>
		<!-- Top vent -->
		<rect x="35" y="20" width="50" height="4" rx="1"
			fill="#999999" stroke="#888888" stroke-width="0.5"/>
		<line x1="45" y1="21" x2="45" y2="23" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="55" y1="21" x2="55" y2="23" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="65" y1="21" x2="65" y2="23" stroke="#aaaaaa" stroke-width="0.5"/>
		<line x1="75" y1="21" x2="75" y2="23" stroke="#aaaaaa" stroke-width="0.5"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight"
		x="8" y="18" width="104" height="132"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="80" y="18" width="12" height="12"
		fill="none" stroke="none" display="none"/>
</svg>
