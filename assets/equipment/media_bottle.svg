<svg xmlns="http://www.w3.org/2000/svg" id="media_bottle" viewBox="0 0 54 110.5">
	<defs>
		<!-- Liquid clip: inner bottle wall rectangle -->
		<clipPath id="anchor_liquid_clip">
			<rect x="6" y="32.5" width="42" height="72" rx="2"/>
		</clipPath>
	</defs>


	<!-- BODY: main bottle shape -->
	<g id="body">
		<!-- main bottle body (flat polystyrene rectangle) -->
		<rect x="2" y="28.5" width="50" height="80" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- inner face (slightly lighter for depth) -->
		<rect x="6" y="32.5" width="42" height="72" rx="3" fill="#f8f8f8" stroke="none"/>
		<!-- left side shine -->
		<rect x="7" y="36.5" width="4" height="60" rx="1" fill="#ffffff" opacity="0.5"/>
		<!-- bottom edge highlight -->
		<line x1="6" y1="105.5" x2="48" y2="105.5" stroke="#dddddd" stroke-width="0.8"/>
	</g>

	<!-- NECK: connecting to cap -->
	<g id="neck">
		<path d="M 17 18.5 L 14 28.5 L 40 28.5 L 37 18.5 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<path d="M 20 20.5 L 17 26.5 L 37 26.5 L 34 20.5 Z" fill="#f8f8f8" stroke="none"/>
		<line x1="19" y1="23.5" x2="35" y2="23.5" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: screw cap -->
	<g id="cap">
		<rect x="15" y="4.5" width="24" height="16" rx="2" fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<ellipse cx="27" cy="4.5" rx="12" ry="2.5" fill="#999999" stroke="#333333" stroke-width="1"/>
		<line x1="19" y1="10.5" x2="39" y2="10.5" stroke="#666666" stroke-width="0.4"/>
		<line x1="19" y1="13.5" x2="39" y2="13.5" stroke="#666666" stroke-width="0.4"/>
		<line x1="19" y1="16.5" x2="39" y2="16.5" stroke="#666666" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="7" y="61.5" width="40" height="28" rx="1" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="6" y="32.5" width="42" height="72" fill="none" stroke="none" display="none"/>
	<rect id="anchor_highlight" x="0" y="2.5" width="56" height="110" fill="none" stroke="none" display="none"/>
	<rect id="anchor_label" x="7" y="61.5" width="40" height="28" fill="none" stroke="none" display="none"/>
	<rect id="anchor_error" x="47" y="25.5" width="16" height="16" fill="none" stroke="none" display="none"/>
</svg>
