<svg xmlns="http://www.w3.org/2000/svg" id="dilution_tube_rack" viewBox="0 0 80 50">
	<!-- 1.5 mL microcentrifuge tube rack: 2 rows x 8 tubes in a flat plastic tray. -->
	<defs>
		<linearGradient id="micro_tube" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#f0ece0"/>
			<stop offset="50%" stop-color="#ffffff"/>
			<stop offset="100%" stop-color="#d8d2c0"/>
		</linearGradient>
	</defs>

	<!-- Rack base -->
	<g id="base">
		<rect x="2" y="32" width="76" height="16" rx="2" fill="#d8a858" stroke="#8a6a30" stroke-width="1"/>
		<rect x="4" y="34" width="72" height="3" rx="1" fill="#e8c078"/>
		<!-- Tube holes in base surface (16 holes, 2 rows x 8) -->
		<g fill="#6a4a18">
			<circle cx="7"  cy="36" r="1.6"/>
			<circle cx="16" cy="36" r="1.6"/>
			<circle cx="25" cy="36" r="1.6"/>
			<circle cx="34" cy="36" r="1.6"/>
			<circle cx="43" cy="36" r="1.6"/>
			<circle cx="52" cy="36" r="1.6"/>
			<circle cx="61" cy="36" r="1.6"/>
			<circle cx="70" cy="36" r="1.6"/>
			<circle cx="7"  cy="43" r="1.6"/>
			<circle cx="16" cy="43" r="1.6"/>
			<circle cx="25" cy="43" r="1.6"/>
			<circle cx="34" cy="43" r="1.6"/>
			<circle cx="43" cy="43" r="1.6"/>
			<circle cx="52" cy="43" r="1.6"/>
			<circle cx="61" cy="43" r="1.6"/>
			<circle cx="70" cy="43" r="1.6"/>
		</g>
	</g>

	<!-- Front row of 8 tubes standing up in the rack -->
	<g id="tubes" stroke="#8a7840" stroke-width="0.4">
		<!-- Each tube: flat cap hinge top + cylindrical body + V bottom -->
		<g>
			<path d="M 5 10 L 5 28 Q 5 30 7 31 Q 9 30 9 28 L 9 10 Z" fill="url(#micro_tube)"/>
			<path d="M 4 8 Q 7 6 10 8 L 10 10 L 4 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 14 10 L 14 28 Q 14 30 16 31 Q 18 30 18 28 L 18 10 Z" fill="url(#micro_tube)"/>
			<path d="M 13 8 Q 16 6 19 8 L 19 10 L 13 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 23 10 L 23 28 Q 23 30 25 31 Q 27 30 27 28 L 27 10 Z" fill="url(#micro_tube)"/>
			<path d="M 22 8 Q 25 6 28 8 L 28 10 L 22 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 32 10 L 32 28 Q 32 30 34 31 Q 36 30 36 28 L 36 10 Z" fill="url(#micro_tube)"/>
			<path d="M 31 8 Q 34 6 37 8 L 37 10 L 31 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 41 10 L 41 28 Q 41 30 43 31 Q 45 30 45 28 L 45 10 Z" fill="url(#micro_tube)"/>
			<path d="M 40 8 Q 43 6 46 8 L 46 10 L 40 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 50 10 L 50 28 Q 50 30 52 31 Q 54 30 54 28 L 54 10 Z" fill="url(#micro_tube)"/>
			<path d="M 49 8 Q 52 6 55 8 L 55 10 L 49 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 59 10 L 59 28 Q 59 30 61 31 Q 63 30 63 28 L 63 10 Z" fill="url(#micro_tube)"/>
			<path d="M 58 8 Q 61 6 64 8 L 64 10 L 58 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
		<g>
			<path d="M 68 10 L 68 28 Q 68 30 70 31 Q 72 30 72 28 L 72 10 Z" fill="url(#micro_tube)"/>
			<path d="M 67 8 Q 70 6 73 8 L 73 10 L 67 10 Z" fill="#6a8a40" stroke="#3a5a18"/>
		</g>
	</g>
</svg>
