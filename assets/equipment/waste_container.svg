<svg id="waste_container" viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Liquid clip: inner Erlenmeyer body silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 22 32 L 18 57 Q 18 67 23 70 L 47 70 Q 52 67 52 57 L 48 32 Z"/>
		</clipPath>
	</defs>

	<!-- BODY SHADOW: depth offset (3px right, 3px down) -->
	<g id="body_shadow">
		<!-- flask body shadow -->
		<path d="M 23 18 L 21 33 L 17 60 Q 17 70 22 73 L 52 73 Q 57 70 57 60 L 53 33 L 51 18 Z"
			fill="#cccccc"/>
		<!-- neck shadow -->
		<rect x="30" y="11" width="16" height="10" rx="1" fill="#cccccc"/>
		<!-- cap shadow -->
		<rect x="30" y="5" width="16" height="8" rx="1" fill="#777777"/>
	</g>

	<!-- BODY: Erlenmeyer-style waste bottle -->
	<g id="body">
		<!-- flask body (wide at bottom, tapers at neck junction) -->
		<path d="M 20 15 L 18 30 L 15 57 Q 15 67 20 70 L 50 70 Q 55 67 55 57 L 52 30 L 50 15 Z"
			fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- inner face -->
		<path d="M 23 18 L 21 30 L 18 57 Q 18 64 22 67 L 48 67 Q 52 64 52 57 L 49 30 L 47 18 Z"
			fill="#f8f8f8" stroke="none"/>
		<!-- glass shine -->
		<ellipse cx="26" cy="42" rx="3" ry="14"
			fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- NECK: narrow connecting section -->
	<g id="neck">
		<rect x="27" y="8" width="16" height="9" rx="1"
			fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<rect x="29" y="10" width="12" height="5" rx="0.5"
			fill="#f8f8f8" stroke="none"/>
		<line x1="29" y1="12" x2="41" y2="12"
			stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: screw cap -->
	<g id="cap">
		<rect x="27" y="3" width="16" height="7" rx="1"
			fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<ellipse cx="35" cy="3" rx="8" ry="2"
			fill="#999999" stroke="#333333" stroke-width="1"/>
		<line x1="30" y1="6" x2="40" y2="6"
			stroke="#666666" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="22" y="50" width="26" height="14" rx="1"
			fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds"
		x="17" y="30" width="36" height="40"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_highlight"
		x="13" y="1" width="44" height="72"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_label"
		x="22" y="50" width="26" height="14"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="53" y="14" width="14" height="14"
		fill="none" stroke="none" display="none"/>
</svg>
