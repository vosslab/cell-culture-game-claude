<svg xmlns="http://www.w3.org/2000/svg" id="waste_container" viewBox="0 0 44 73">
	<defs>
		<!-- Liquid clip: inner Erlenmeyer body silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 9 33 L 5 58 Q 5 68 10 71 L 34 71 Q 39 68 39 58 L 35 33 Z"/>
		</clipPath>
	</defs>


	<!-- BODY: Erlenmeyer-style waste bottle -->
	<g id="body">
		<!-- flask body (wide at bottom, tapers at neck junction) -->
		<path d="M 7 16 L 5 31 L 2 58 Q 2 68 7 71 L 37 71 Q 42 68 42 58 L 39 31 L 37 16 Z" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- inner face -->
		<path d="M 10 19 L 8 31 L 5 58 Q 5 65 9 68 L 35 68 Q 39 65 39 58 L 36 31 L 34 19 Z" fill="#f8f8f8" stroke="none"/>
		<!-- glass shine -->
		<ellipse cx="13" cy="43" rx="3" ry="14" fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- NECK: narrow connecting section -->
	<g id="neck">
		<rect x="14" y="9" width="16" height="9" rx="1" fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<rect x="16" y="11" width="12" height="5" rx="0.5" fill="#f8f8f8" stroke="none"/>
		<line x1="16" y1="13" x2="28" y2="13" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: screw cap -->
	<g id="cap">
		<rect x="14" y="4" width="16" height="7" rx="1" fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<ellipse cx="22" cy="4" rx="8" ry="2" fill="#999999" stroke="#333333" stroke-width="1"/>
		<line x1="17" y1="7" x2="27" y2="7" stroke="#666666" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background -->
	<g id="label_frame">
		<rect x="9" y="51" width="26" height="14" rx="1" fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="4" y="31" width="36" height="40" fill="none" stroke="none" display="none"/>
	<rect id="anchor_highlight" x="0" y="2" width="44" height="72" fill="none" stroke="none" display="none"/>
	<rect id="anchor_label" x="9" y="51" width="26" height="14" fill="none" stroke="none" display="none"/>
	<rect id="anchor_error" x="40" y="15" width="14" height="14" fill="none" stroke="none" display="none"/>
</svg>
