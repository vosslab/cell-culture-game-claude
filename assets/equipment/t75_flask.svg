<svg id="t75_flask" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<!-- Liquid clipping region: follows flask interior silhouette -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 16 55 L 16 155 Q 16 160 20 162 L 100 162 Q 104 160 104 155 L 104 55 Z"/>
		</clipPath>
	</defs>

	<!-- BODY SHADOW: depth offset (3px right, 3px down) -->
	<g id="body_shadow">
		<!-- Flask body shadow -->
		<rect x="18" y="53" width="88" height="112" rx="4" fill="#cccccc"/>
		<!-- Neck shadow -->
		<path d="M 43 18 L 38 50 L 82 50 L 77 18 Z" fill="#cccccc"/>
		<!-- Cap shadow -->
		<rect x="43" y="6" width="34" height="14" rx="2" fill="#777777"/>
	</g>

	<!-- BODY: main flask shape (flat rectangular T-75) -->
	<g id="body">
		<!-- Main flask body (flat polystyrene rectangle) -->
		<rect x="15" y="50" width="88" height="112" rx="4"
			fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- Inner face (slightly lighter for depth) -->
		<rect x="19" y="54" width="80" height="104" rx="3"
			fill="#f8f8f8" stroke="none"/>
		<!-- Top face ellipse (3D opening effect) -->
		<ellipse cx="59" cy="50" rx="44" ry="5"
			fill="#fafafa" stroke="#333333" stroke-width="1.5"/>
		<!-- Bottom edge highlight -->
		<line x1="19" y1="158" x2="99" y2="158"
			stroke="#dddddd" stroke-width="0.8"/>
		<!-- Glass shine on left side -->
		<rect x="20" y="58" width="4" height="90" rx="1"
			fill="#ffffff" opacity="0.5"/>
	</g>

	<!-- NECK: angled neck connecting body to cap -->
	<g id="neck">
		<!-- Neck walls -->
		<path d="M 40 15 L 35 50 L 83 50 L 78 15 Z"
			fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
		<!-- Neck interior (glass tint) -->
		<path d="M 44 18 L 39 48 L 79 48 L 74 18 Z"
			fill="#f8f8f8" stroke="none"/>
		<!-- Thread lines on neck -->
		<line x1="42" y1="22" x2="76" y2="22"
			stroke="#999999" stroke-width="0.4"/>
		<line x1="41" y1="30" x2="77" y2="30"
			stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- CAP: screw cap -->
	<g id="cap">
		<!-- Cap body -->
		<rect x="40" y="3" width="38" height="14" rx="2"
			fill="#888888" stroke="#333333" stroke-width="1.5"/>
		<!-- Cap top face -->
		<ellipse cx="59" cy="3" rx="19" ry="3"
			fill="#999999" stroke="#333333" stroke-width="1"/>
		<!-- Cap grip ridges -->
		<line x1="44" y1="8" x2="74" y2="8"
			stroke="#666666" stroke-width="0.4"/>
		<line x1="44" y1="11" x2="74" y2="11"
			stroke="#666666" stroke-width="0.4"/>
		<line x1="44" y1="14" x2="74" y2="14"
			stroke="#666666" stroke-width="0.4"/>
	</g>

	<!-- GRADUATION: volume marks on flask wall -->
	<g id="graduation">
		<!-- Major marks (every 25 mL equivalent) -->
		<line x1="95" y1="70" x2="105" y2="70"
			stroke="#666666" stroke-width="0.8"/>
		<line x1="95" y1="90" x2="105" y2="90"
			stroke="#666666" stroke-width="0.8"/>
		<line x1="95" y1="110" x2="105" y2="110"
			stroke="#666666" stroke-width="0.8"/>
		<line x1="95" y1="130" x2="105" y2="130"
			stroke="#666666" stroke-width="0.8"/>
		<line x1="95" y1="150" x2="105" y2="150"
			stroke="#666666" stroke-width="0.8"/>
		<!-- Volume labels -->
		<text x="107" y="72" font-family="Arial,sans-serif" font-size="5"
			fill="#666666">75</text>
		<text x="107" y="92" font-family="Arial,sans-serif" font-size="5"
			fill="#666666">50</text>
		<text x="107" y="112" font-family="Arial,sans-serif" font-size="5"
			fill="#666666">25</text>
		<!-- Minor marks -->
		<line x1="97" y1="80" x2="103" y2="80"
			stroke="#999999" stroke-width="0.4"/>
		<line x1="97" y1="100" x2="103" y2="100"
			stroke="#999999" stroke-width="0.4"/>
		<line x1="97" y1="120" x2="103" y2="120"
			stroke="#999999" stroke-width="0.4"/>
		<line x1="97" y1="140" x2="103" y2="140"
			stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- LABEL_FRAME: static label background (text is dynamic) -->
	<g id="label_frame">
		<rect x="25" y="95" width="52" height="30" rx="1"
			fill="#ffffff" opacity="0.85" stroke="#999999" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements for the engine -->
	<!-- Liquid fill region bounds -->
	<rect id="anchor_liquid_bounds"
		x="16" y="55" width="88" height="107"
		fill="none" stroke="none" display="none"/>
	<!-- Highlight border bounds (slightly outside body) -->
	<rect id="anchor_highlight"
		x="13" y="1" width="96" height="165"
		fill="none" stroke="none" display="none"/>
	<!-- Dynamic label position (inside label_frame) -->
	<rect id="anchor_label"
		x="25" y="95" width="52" height="30"
		fill="none" stroke="none" display="none"/>
	<!-- Error indicator position (top-right corner) -->
	<rect id="anchor_error"
		x="90" y="45" width="16" height="16"
		fill="none" stroke="none" display="none"/>
</svg>
