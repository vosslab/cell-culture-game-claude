<svg id="well_plate_24" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">


	<!-- BODY: 24-well plate frame and empty wells -->
	<g id="body">
		<!-- plate frame -->
		<rect x="2" y="2" width="196" height="126" rx="6"
			fill="#e8e8e8" stroke="#333333" stroke-width="1.5"/>
		<!-- inner platform surface -->
		<rect x="6" y="6" width="188" height="118" rx="4"
			fill="#f0f0f0" stroke="none"/>
		<!-- column labels (1-6) -->
		<text x="22" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">1</text>
		<text x="50" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">2</text>
		<text x="78" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">3</text>
		<text x="106" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">4</text>
		<text x="134" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">5</text>
		<text x="162" y="14" font-family="Arial,sans-serif" font-size="7" fill="#999999" text-anchor="middle">6</text>
		<!-- row labels (A-D) -->
		<text x="8" y="22" font-family="Arial,sans-serif" font-size="7" fill="#999999">A</text>
		<text x="8" y="48" font-family="Arial,sans-serif" font-size="7" fill="#999999">B</text>
		<text x="8" y="74" font-family="Arial,sans-serif" font-size="7" fill="#999999">C</text>
		<text x="8" y="100" font-family="Arial,sans-serif" font-size="7" fill="#999999">D</text>
		<!-- empty wells row A (cy=18) -->
		<circle cx="22" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="50" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="78" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="106" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="134" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="162" cy="18" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<!-- empty wells row B (cy=44) -->
		<circle cx="22" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="50" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="78" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="106" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="134" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="162" cy="44" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<!-- empty wells row C (cy=70) -->
		<circle cx="22" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="50" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="78" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="106" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="134" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="162" cy="70" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<!-- empty wells row D (cy=96) -->
		<circle cx="22" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="50" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="78" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="106" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="134" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
		<circle cx="162" cy="96" r="10" fill="#f5f5f5" stroke="#cccccc" stroke-width="0.8"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects per-well color overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight"
		x="0" y="0" width="200" height="130"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="172" y="4" width="20" height="20"
		fill="none" stroke="none" display="none"/>
</svg>
