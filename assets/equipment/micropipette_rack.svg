<svg xmlns="http://www.w3.org/2000/svg" id="micropipette_rack" viewBox="0 0 60 85">
	<!-- Micropipette rack: three pipettes (P20/P200/P1000) hanging on a stand.
	     The stand is a horizontal bar with three hook slots. Each pipette is
	     a tapered body + plunger button at top + ejection lever + tip. -->
	<defs>
		<linearGradient id="pip_body_p20" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#c83838"/>
			<stop offset="50%" stop-color="#e65858"/>
			<stop offset="100%" stop-color="#a02020"/>
		</linearGradient>
		<linearGradient id="pip_body_p200" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#d8a848"/>
			<stop offset="50%" stop-color="#eec068"/>
			<stop offset="100%" stop-color="#b08828"/>
		</linearGradient>
		<linearGradient id="pip_body_p1000" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#3868c8"/>
			<stop offset="50%" stop-color="#5888e8"/>
			<stop offset="100%" stop-color="#2048a0"/>
		</linearGradient>
	</defs>

	<!-- Stand: horizontal bar with vertical posts at each end -->
	<g id="stand">
		<rect x="4" y="10" width="52" height="4" rx="1" fill="#606870" stroke="#2a3038" stroke-width="0.8"/>
		<rect x="4" y="14" width="3" height="65" fill="#606870" stroke="#2a3038" stroke-width="0.6"/>
		<rect x="53" y="14" width="3" height="65" fill="#606870" stroke="#2a3038" stroke-width="0.6"/>
		<rect x="2" y="79" width="56" height="4" rx="1" fill="#606870" stroke="#2a3038" stroke-width="0.8"/>
	</g>

	<!-- P20 pipette (leftmost, smallest) -->
	<g id="p20">
		<!-- plunger button -->
		<rect x="13" y="16" width="4" height="5" rx="0.5" fill="#f0d848" stroke="#8a6a18" stroke-width="0.5"/>
		<line x1="14" y1="17" x2="16" y2="17" stroke="#8a6a18" stroke-width="0.3"/>
		<!-- upper body (fat, tapering) -->
		<path d="M 12 21 L 18 21 L 17 45 L 13 45 Z" fill="url(#pip_body_p20)" stroke="#5a0a0a" stroke-width="0.6"/>
		<!-- ejection lever -->
		<rect x="10.5" y="32" width="3" height="6" rx="0.5" fill="#d0d0d0" stroke="#5a5a5a" stroke-width="0.4"/>
		<!-- volume display window -->
		<rect x="13.5" y="26" width="3" height="5" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="0.3"/>
		<text x="15" y="30" text-anchor="middle" font-family="sans-serif" font-size="2.2" fill="#88ff88">020</text>
		<!-- lower tapered stem -->
		<path d="M 13 45 L 17 45 L 16 62 L 14 62 Z" fill="url(#pip_body_p20)" stroke="#5a0a0a" stroke-width="0.5"/>
		<!-- tip (disposable clear tip) -->
		<path d="M 14 62 L 16 62 L 15.2 76 L 14.8 76 Z" fill="#f0f4f8" stroke="#8a95a0" stroke-width="0.4"/>
	</g>

	<!-- P200 pipette (center, medium) -->
	<g id="p200">
		<rect x="28" y="16" width="4" height="5" rx="0.5" fill="#f0d848" stroke="#8a6a18" stroke-width="0.5"/>
		<line x1="29" y1="17" x2="31" y2="17" stroke="#8a6a18" stroke-width="0.3"/>
		<path d="M 26 21 L 34 21 L 33 46 L 27 46 Z" fill="url(#pip_body_p200)" stroke="#6a4010" stroke-width="0.6"/>
		<rect x="24" y="32" width="3.5" height="6" rx="0.5" fill="#d0d0d0" stroke="#5a5a5a" stroke-width="0.4"/>
		<rect x="27.5" y="26" width="4" height="5" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="0.3"/>
		<text x="29.5" y="30" text-anchor="middle" font-family="sans-serif" font-size="2.2" fill="#88ff88">200</text>
		<path d="M 27 46 L 33 46 L 31 66 L 29 66 Z" fill="url(#pip_body_p200)" stroke="#6a4010" stroke-width="0.5"/>
		<path d="M 29 66 L 31 66 L 30.4 78 L 29.6 78 Z" fill="#f0f4f8" stroke="#8a95a0" stroke-width="0.4"/>
	</g>

	<!-- P1000 pipette (rightmost, largest) -->
	<g id="p1000">
		<rect x="43" y="16" width="5" height="5" rx="0.5" fill="#f0d848" stroke="#8a6a18" stroke-width="0.5"/>
		<line x1="44" y1="17" x2="47" y2="17" stroke="#8a6a18" stroke-width="0.3"/>
		<path d="M 40 21 L 51 21 L 49 46 L 42 46 Z" fill="url(#pip_body_p1000)" stroke="#0a2060" stroke-width="0.6"/>
		<rect x="38" y="32" width="4" height="7" rx="0.5" fill="#d0d0d0" stroke="#5a5a5a" stroke-width="0.4"/>
		<rect x="42" y="26" width="5" height="5" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="0.3"/>
		<text x="44.5" y="30" text-anchor="middle" font-family="sans-serif" font-size="2.2" fill="#88ff88">1000</text>
		<path d="M 42 46 L 49 46 L 47 68 L 44 68 Z" fill="url(#pip_body_p1000)" stroke="#0a2060" stroke-width="0.5"/>
		<path d="M 44 68 L 47 68 L 46.3 78 L 44.7 78 Z" fill="#f0f4f8" stroke="#8a95a0" stroke-width="0.4"/>
	</g>
</svg>
