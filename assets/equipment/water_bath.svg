<svg xmlns="http://www.w3.org/2000/svg" id="water_bath" viewBox="0 0 80 70">
	<!-- 37C water bath: rectangular stainless tank with lid raised and blue water visible. -->
	<defs>
		<linearGradient id="wb_body" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#d6dce2"/>
			<stop offset="50%" stop-color="#c0c6cc"/>
			<stop offset="100%" stop-color="#8a9098"/>
		</linearGradient>
		<linearGradient id="wb_water" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" stop-color="#8ec5e8"/>
			<stop offset="100%" stop-color="#5a9fd4"/>
		</linearGradient>
	</defs>

	<g id="body">
	<!-- Rubber feet -->
	<rect x="6"  y="64" width="6" height="4" rx="1" fill="#2a2a2a"/>
	<rect x="68" y="64" width="6" height="4" rx="1" fill="#2a2a2a"/>

	<!-- Outer housing -->
	<rect x="4" y="28" width="72" height="38" rx="3" fill="url(#wb_body)" stroke="#3a4048" stroke-width="1"/>

	<!-- Water tank well -->
	<rect x="10" y="34" width="54" height="22" rx="1" fill="#2a3038" stroke="#1a2028" stroke-width="0.6"/>
	<!-- Blue water fill -->
	<rect x="11" y="36" width="52" height="19" fill="url(#wb_water)"/>
	<!-- Water surface highlights -->
	<line x1="12" y1="38" x2="62" y2="38" stroke="#b8dcf0" stroke-width="0.5" opacity="0.7"/>
	<line x1="14" y1="40.5" x2="60" y2="40.5" stroke="#b8dcf0" stroke-width="0.3" opacity="0.5"/>

	<!-- Temperature display -->
	<rect x="66" y="36" width="9" height="7" rx="0.6" fill="#0a1a0a" stroke="#1a2a1a" stroke-width="0.4"/>
	<text x="66.8" y="41.5" font-family="monospace" font-size="4.5" fill="#4ade80">37C</text>

	<!-- Knob -->
	<circle cx="70.5" cy="52" r="2.8" fill="#4a5460" stroke="#2a3038" stroke-width="0.6"/>
	<line x1="70.5" y1="52" x2="70.5" y2="49.5" stroke="#e0e0e0" stroke-width="0.6"/>

	<!-- Raised lid hinged at the back -->
	<g transform="rotate(-20 10 28)">
		<rect x="10" y="22" width="58" height="4" rx="1" fill="#9098a0" stroke="#3a4048" stroke-width="0.6"/>
		<!-- Lid handle -->
		<rect x="34" y="17" width="10" height="3" rx="1" fill="#2a3038"/>
		<line x1="39" y1="20" x2="39" y2="22" stroke="#2a3038" stroke-width="0.8"/>
	</g>

	<!-- Brand label -->
	<text x="10" y="63" font-family="sans-serif" font-size="3.5" fill="#3a4048">37C Water Bath</text>
	</g>
	<g id="overlay_root"/>
</svg>
