<svg viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg">
  <!-- Glove box (hinged lid container) -->
  <defs>
    <linearGradient id="gloveBoxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main box body -->
  <rect x="6" y="15" width="48" height="38" fill="url(#gloveBoxGrad)" stroke="#e65100" stroke-width="1.5" rx="2"/>

  <!-- Lid (slightly open) -->
  <polygon points="6,15 54,15 52,10 8,10" fill="#ffb74d" stroke="#e65100" stroke-width="1"/>

  <!-- Hinge -->
  <circle cx="10" cy="10" r="1.5" fill="#666"/>
  <circle cx="50" cy="10" r="1.5" fill="#666"/>

  <!-- Gloves inside (hint of latex texture) -->
  <ellipse cx="20" cy="32" rx="6" ry="8" fill="#f5deb3" stroke="#daa520" stroke-width="0.5"/>
  <ellipse cx="40" cy="32" rx="6" ry="8" fill="#f5deb3" stroke="#daa520" stroke-width="0.5"/>

  <!-- Label -->
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Gloves</text>
</svg>
