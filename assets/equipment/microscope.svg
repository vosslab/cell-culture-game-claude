<svg id="microscope" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">

	<!-- BODY SHADOW: depth offset (3px right, 3px down) -->
	<g id="body_shadow">
		<!-- base shadow -->
		<rect x="13" y="103" width="62" height="12" rx="3" fill="#cccccc"/>
		<!-- arm shadow -->
		<rect x="58" y="33" width="12" height="72" rx="2" fill="#cccccc"/>
		<!-- eyepiece shadow -->
		<rect x="35" y="8" width="16" height="14" rx="2" fill="#777777"/>
	</g>

	<!-- BODY: main microscope structure -->
	<g id="body">
		<!-- base (heavy stand) -->
		<rect x="10" y="100" width="60" height="12" rx="3"
			fill="#333333" stroke="#222222" stroke-width="1.5"/>
		<rect x="12" y="101" width="56" height="5" rx="2"
			fill="#444444" stroke="none"/>
		<!-- vertical arm -->
		<rect x="55" y="30" width="10" height="72" rx="2"
			fill="#444444" stroke="#333333" stroke-width="1"/>
		<!-- arm curve to head (thick path for depth) -->
		<path d="M 55 34 Q 55 17 40 12"
			stroke="#444444" stroke-width="10" fill="none" stroke-linecap="round"/>
		<path d="M 56 34 Q 56 18 41 13"
			stroke="#555555" stroke-width="5" fill="none" stroke-linecap="round"/>
		<!-- eyepiece tube -->
		<rect x="32" y="4" width="16" height="14" rx="2"
			fill="#555555" stroke="#333333" stroke-width="1"/>
		<ellipse cx="40" cy="4" rx="10" ry="3"
			fill="#666666" stroke="#333333" stroke-width="1"/>
		<!-- eyepiece lens ring -->
		<ellipse cx="40" cy="4" rx="6" ry="2"
			fill="#222222" stroke="none"/>
		<!-- stage (sample platform) -->
		<rect x="20" y="83" width="40" height="8" rx="1"
			fill="#555555" stroke="#333333" stroke-width="0.8"/>
		<!-- stage surface highlight -->
		<rect x="22" y="84" width="36" height="3" rx="0.5"
			fill="#666666" stroke="none"/>
		<!-- stage clips -->
		<rect x="22" y="80" width="5" height="5" rx="0.5"
			fill="#888888" stroke="#666666" stroke-width="0.4"/>
		<rect x="53" y="80" width="5" height="5" rx="0.5"
			fill="#888888" stroke="#666666" stroke-width="0.4"/>
		<!-- objective turret -->
		<circle cx="40" cy="76" r="6"
			fill="#666666" stroke="#333333" stroke-width="0.8"/>
		<!-- objective lenses (3) pointing down -->
		<rect x="35" y="76" width="3" height="9" rx="1" fill="#777777"/>
		<rect x="39" y="78" width="3" height="7" rx="1" fill="#888888"/>
		<rect x="43" y="77" width="3" height="8" rx="1" fill="#777777"/>
		<!-- coarse focus knob -->
		<circle cx="65" cy="64" r="5"
			fill="#666666" stroke="#555555" stroke-width="0.5"/>
		<circle cx="65" cy="64" r="2" fill="#777777"/>
		<!-- fine focus knob -->
		<circle cx="65" cy="74" r="4"
			fill="#777777" stroke="#555555" stroke-width="0.5"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight"
		x="8" y="1" width="64" height="115"
		fill="none" stroke="none" display="none"/>
	<rect id="anchor_error"
		x="62" y="3" width="14" height="14"
		fill="none" stroke="none" display="none"/>
</svg>
