<svg xmlns="http://www.w3.org/2000/svg" id="microscope" viewBox="0 0 64 115">


	<!-- BODY: main microscope structure -->
	<g id="body">
		<!-- base (heavy stand) -->
		<rect x="2" y="101" width="60" height="12" rx="3" fill="#333333" stroke="#222222" stroke-width="1.5"/>
		<rect x="4" y="102" width="56" height="5" rx="2" fill="#444444" stroke="none"/>
		<!-- vertical arm -->
		<rect x="47" y="31" width="10" height="72" rx="2" fill="#444444" stroke="#333333" stroke-width="1"/>
		<!-- arm curve to head (thick path for depth) -->
		<path d="M 47 35 Q 47 18 32 13" stroke="#444444" stroke-width="10" fill="none" stroke-linecap="round"/>
		<path d="M 48 35 Q 48 19 33 14" stroke="#555555" stroke-width="5" fill="none" stroke-linecap="round"/>
		<!-- eyepiece tube -->
		<rect x="24" y="5" width="16" height="14" rx="2" fill="#555555" stroke="#333333" stroke-width="1"/>
		<ellipse cx="32" cy="5" rx="10" ry="3" fill="#666666" stroke="#333333" stroke-width="1"/>
		<!-- eyepiece lens ring -->
		<ellipse cx="32" cy="5" rx="6" ry="2" fill="#222222" stroke="none"/>
		<!-- stage (sample platform) -->
		<rect x="12" y="84" width="40" height="8" rx="1" fill="#555555" stroke="#333333" stroke-width="0.8"/>
		<!-- stage surface highlight -->
		<rect x="14" y="85" width="36" height="3" rx="0.5" fill="#666666" stroke="none"/>
		<!-- stage clips -->
		<rect x="14" y="81" width="5" height="5" rx="0.5" fill="#888888" stroke="#666666" stroke-width="0.4"/>
		<rect x="45" y="81" width="5" height="5" rx="0.5" fill="#888888" stroke="#666666" stroke-width="0.4"/>
		<!-- objective turret -->
		<circle cx="32" cy="77" r="6" fill="#666666" stroke="#333333" stroke-width="0.8"/>
		<!-- objective lenses (3) pointing down -->
		<rect x="27" y="77" width="3" height="9" rx="1" fill="#777777"/>
		<rect x="31" y="79" width="3" height="7" rx="1" fill="#888888"/>
		<rect x="35" y="78" width="3" height="8" rx="1" fill="#777777"/>
		<!-- coarse focus knob -->
		<circle cx="57" cy="65" r="5" fill="#666666" stroke="#555555" stroke-width="0.5"/>
		<circle cx="57" cy="65" r="2" fill="#777777"/>
		<!-- fine focus knob -->
		<circle cx="57" cy="75" r="4" fill="#777777" stroke="#555555" stroke-width="0.5"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_highlight" x="0" y="2" width="64" height="115" fill="none" stroke="none" display="none"/>
	<rect id="anchor_error" x="54" y="4" width="14" height="14" fill="none" stroke="none" display="none"/>
</svg>
